- name: Install client packages
  become: true
  ansible.builtin.apt:
    name: "{{ nfs_client_packages }}"
    state: present
    update_cache: true

- name: Ensure /mnt/nfs exists
  become: true
  ansible.builtin.file:
    path: /mnt/nfs
    state: directory
    mode: "0755"


- name: Ensure nfs group exists
  ansible.builtin.group:
    name: "{{ nfs_user_name }}"
    # gid: "{{ nfs_group_gid }}"
    state: present
    system: true
  register: nfs_group

- name: Ensure nfs user exists
  ansible.builtin.user:
    name: "{{ nfs_user_name }}"
    state: present
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    uid: "{{ nfs_user_uid | default(omit) }}"
    group: "{{ nfs_user_name }}"
  when: nfs_group is changed

- name: Check if UID already exists
  ansible.builtin.command: "getent passwd {{ nfs_user_uid }}"
  register: existing_uid
  changed_when: false
  failed_when: false
  # Read-only probe: must run in check mode or the guard below passes vacuously
  check_mode: false

- name: Ensure NFS user exists (only if UID not already defined)
  ansible.builtin.user:
    name: "{{ nfs_user_name }}"
    state: present
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    uid: "{{ nfs_user_uid }}"
    group: "{{ nfs_group_name }}"
  when: existing_uid.stdout == ""


- name: Detect automount capability
  ansible.builtin.set_fact:
    nfs_can_systemd_automount: "{{ (ansible_service_mgr == 'systemd') and (ansible_virtualization_type != 'lxc') }}"

- name: Prepare mountpoints that are not already mounted
  ansible.builtin.include_tasks: prepare_mount.yml
  loop: "{{ nfs_shares }}"
  loop_control:
    loop_var: nfs_item

- name: Ensure fstab entries
  become: true
  vars:
    _opts: "{{ nfs_opts | default(nfs_opts_default) }}"
    _src: >-
      {{ (':' in item.target) | ternary(item.target, truenas_ip ~ ':' ~ item.target) }}
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  mount:
    src: "{{ _src }}"
    path: "{{ item.mountpoint }}"
    fstype: nfs
    opts: "{{ _opts }}"
    state: present

- name: Systemd daemon-reload
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable+start systemd automount units (VMs only)
  become: true
  when: nfs_can_systemd_automount
  loop: "{{ nfs_shares }}"
  loop_control: { label: "{{ item.name }}" }
  ansible.builtin.systemd:
    name: "{{ (item.mountpoint | regex_replace('^/', '') | regex_replace('/', '-')) }}.automount"
    enabled: true
    state: started

- name: Show systemd automount status
  become: true
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  ansible.builtin.command: "systemctl show -p ActiveState {{ (item.mountpoint | regex_replace('^/', '') | regex_replace('/', '-')) }}.automount"
  changed_when: false
  when: nfs_can_systemd_automount

- name: Include autofs setup (LXCs only)
  when: not nfs_can_systemd_automount
  ansible.builtin.include_tasks: autofs.yml

- name: Trigger first access
  become: true
  loop: "{{ nfs_shares }}"
  loop_control: { label: "{{ item.name }}" }
  ansible.builtin.command: "bash -lc 'timeout 5s ls -d {{ item.mountpoint }}/{{ item.name }} >/dev/null 2>&1 || true'"
  changed_when: false
  failed_when: false

- name: Show mount status (per mount)
  become: true
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  ansible.builtin.shell: |
    echo -n "{{ item.name }}: "
    if mountpoint -q {{ item.mountpoint }}; then echo "mounted"; else echo "not mounted (automount armed)"; fi
  register: _mount_status
  changed_when: false
  # Read-only probe: skipped-loop results have no stdout for the debug task below
  check_mode: false

- name: Debug mount status
  ansible.builtin.debug:
    var: _mount_status.results | map(attribute='stdout') | list
