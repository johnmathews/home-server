- name: Install client packages
  become: yes
  apt:
    name: "{{ nfs_client_packages }}"
    state: present
    update_cache: yes

- name: Ensure /mnt/nfs exists
  become: yes
  file:
    path: /mnt/nfs
    state: directory
    mode: "0755"

- name: Ensure nfs group (optional)
  become: yes
  when: nfs_manage_local_user | bool
  group:
    name: "{{ nfs_user_name }}"
    gid: "{{ nfs_user_gid }}"
    state: present
    system: yes

- name: Ensure nfs user (optional)
  become: yes
  when: nfs_manage_local_user | bool
  user:
    name: "{{ nfs_user_name }}"
    uid: "{{ nfs_user_uid }}"
    group: "{{ nfs_user_name }}"
    state: present
    create_home: no
    shell: /usr/sbin/nologin
    system: yes

- name: Prepare mountpoints that are not already mounted
  include_tasks: prepare_mount.yml
  loop: "{{ nfs_client_mounts }}"
  loop_control:
    loop_var: nfs_item

- name: Ensure fstab entries
  become: yes
  vars:
    _opts: "{{ nfs_opts | default(nfs_opts_default) }}"
    _src: >-
      {{ (':' in item.target) | ternary(item.target, truenas_ip ~ ':' ~ item.target) }}
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  mount:
    src: "{{ _src }}"
    path: "{{ item.mountpoint }}"
    fstype: nfs
    opts: "{{ _opts }}"
    state: present

- name: systemd daemon-reload
  become: yes
  systemd:
    daemon_reload: true

- name: Trigger first access to automounts (non-fatal)
  become: yes
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  command: bash -lc "timeout 5s ls -d {{ item.mountpoint }} >/dev/null 2>&1 || true"
  changed_when: false
  failed_when: false

- name: Show mount status (per mount)
  become: yes
  loop: "{{ nfs_shares }}"
  loop_control:
    label: "{{ item.name }}"
  shell: |
    echo -n "{{ item.name }}: "
    if mountpoint -q {{ item.mountpoint }}; then echo "mounted"; else echo "not mounted (automount armed)"; fi
  register: _mount_status
  changed_when: false

- name: Debug mount status
  debug:
    var: _mount_status.results | map(attribute='stdout') | list
