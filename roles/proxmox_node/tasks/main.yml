# proxmox_node/tasks/main.yml

---

- name: Set up IPMI exporter
  import_tasks: ipmi_exporter.yml
  tags: [metrics]

- name: Set up Node exporter
  import_tasks: node_exporter.yml
  tags: [metrics]

- name: Set up Proxmox exporter
  import_tasks: pve_exporter.yml
  tags: [metrics]

# Run this before the imported Smartctl exporter role. GNU Tar must be running on the local ansible host
- name: Check for GNU tar when running tasks locally
  when: inventory_hostname == 'localhost' or delegate_to is defined and delegate_to == 'localhost'
  block:
    - name: Check if GNU tar (gtar) is available
      command: which gtar
      register: gnu_tar_check
      failed_when: gnu_tar_check.rc != 0
      changed_when: false

    - name: Warn if GNU tar not found in PATH
      fail:
        msg: |
          GNU tar (gtar) is required for this role to work locally.
          Install it using: brew install gnu-tar
          And add to your PATH: export PATH="/opt/homebrew/opt/gnu-tar/libexec/gnubin:$PATH"
      when: gnu_tar_check.rc != 0
  tags: [metrics]

# HDD metrics smart_ctl smartctl_exporter
- name: Install Prometheus Smartctl Exporter
  import_role:
    name: prometheus.prometheus.smartctl_exporter
  tags: [metrics]

# iGPU metrics
- name: Install radeontop metrics exporter
  import_tasks: radeontop-exporter.yml
  tags: [metrics, media, radeontop]

# for homepage
- name: Install glances
  import_tasks: glances.yml
  tags: [metrics, glances]
 
# Docker
- name: Install Docker and deploy containerised apps 
  import_tasks: docker-apps.yml
  tags: [containers]

# hdparm service doesnt exist by default. if the systemd service isnt running then the configuration file /etc/hdparm.conf has no effect.
- name: Ensure hdparm service unit is present and enabled
  block:
    - name: Create hdparm systemd unit file
      copy:
        dest: /etc/systemd/system/hdparm.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Apply hdparm settings
          DefaultDependencies=no
          After=local-fs.target
          Before=shutdown.target

          [Service]
          Type=oneshot
          ExecStart=/sbin/hdparm -B {{ hdparm_apm }} -S {{ hdparm_spindown }} /dev/disk/by-id/{{ hdparm_disk_id }}

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd to pick up hdparm unit
      command: systemctl daemon-reexec
      changed_when: false

    - name: Enable hdparm.service
      systemd:
        name: hdparm.service
        enabled: true

    - name: Start hdparm.service
      systemd:
        name: hdparm.service
        state: started


- name: Include Atuin setup
  ansible.builtin.include_role:
    name: atuin
