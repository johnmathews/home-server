# proxmox_node/tasks/main.yml

---


- name: Ensure apt cache is updated
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Ensure keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Set up IPMI exporter
  import_tasks: ipmi_exporter.yml
  tags: [metrics]

- name: Set up Node exporter
  import_tasks: node_exporter.yml
  tags: [metrics]

- name: Set up Proxmox exporter
  import_tasks: pve_exporter.yml
  tags: [metrics]

# Run this before the imported Smartctl exporter role. GNU Tar must be running on the local ansible host
- name: Check for GNU tar when running tasks locally
  when: inventory_hostname == 'localhost' or delegate_to is defined and delegate_to == 'localhost'
  block:
    - name: Check if GNU tar (gtar) is available
      command: which gtar
      register: gnu_tar_check
      failed_when: gnu_tar_check.rc != 0
      changed_when: false

    - name: Warn if GNU tar not found in PATH
      fail:
        msg: |
          GNU tar (gtar) is required for this role to work locally.
          Install it using: brew install gnu-tar
          And add to your PATH: export PATH="/opt/homebrew/opt/gnu-tar/libexec/gnubin:$PATH"
      when: gnu_tar_check.rc != 0
  tags: [metrics]

# HDD metrics smart_ctl smartctl_exporter
- name: Install Prometheus Smartctl Exporter
  import_role:
    name: prometheus.prometheus.smartctl_exporter
  tags: [metrics, smartctl]

# iGPU metrics
- name: Install radeontop metrics exporter
  import_tasks: radeontop-exporter.yml
  tags: [metrics, media, radeontop]

# for homepage
- name: Install glances
  import_tasks: glances.yml
  tags: [metrics, glances]
 
- name: Setup hdparm for HDD power management 
  import_tasks: hdparm.yml
  tags: [HDD, hdparm]

# NUT 
- name: Setup NUT 
  import_tasks: nut.yml
  tags: [nut]
