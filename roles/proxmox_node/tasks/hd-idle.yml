- name: Download hd-idle deb package
  become: true
  ansible.builtin.get_url:
    url: https://github.com/adelolmo/hd-idle/releases/download/v1.21/hd-idle_1.21_amd64.deb
    dest: /tmp/hd-idle_1.05_amd64.deb
    mode: '0644'

- name: Install hd-idle from deb
  become: true
  ansible.builtin.apt:
    deb: /tmp/hd-idle_1.05_amd64.deb

# Debian/Proxmox package reads options from /etc/default/hd-idle.
# We set a default "no spindown" and then one per-device timeout pair.
- name: Configure hd-idle (per-disk timeouts)
  become: true
  ansible.builtin.copy:
    dest: /etc/default/hd-idle
    mode: '0644'
    owner: root
    group: root
    content: |
      # Ansible managed
      #
      # hd-idle daemon options:
      # -i <secs> sets the *subsequent* timeout for the preceding -a device
      # Recommendation: start with a global "-i 0" (no spindown by default),
      # then add device-specific -a/-i pairs.
      #
      # 900s = 15 minutes for the Barracuda only.
      HD_IDLE_OPTS="-i 0 \
       -a /dev/disk/by-id/ata-ST3000DM007-1WY10G_ZFN1TN5X -i 900"
  notify: Restart hd-idle

- name: Enable & start hd-idle
  become: true
  ansible.builtin.systemd:
    name: hd-idle
    enabled: true
    state: started

# Handler
- name: Restart hd-idle
  become: true
  ansible.builtin.systemd:
    name: hd-idle
    state: restarted
