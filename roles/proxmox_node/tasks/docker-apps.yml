- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: present

- name: Ensure Docker Compose directory exists
  file:
    path: /srv/apps
    state: directory

- name: Deploy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /srv/apps/docker-compose.yml
    owner: root
    group: root
    mode: '0644'

- name: Deploy .env file template 
  template:
    src: templates/.env.j2 
    dest: /srv/apps/.env
    owner: root
    group: root
    mode: '0644'

- name: Start apps using Docker Compose
  community.docker.docker_compose_v2:
    project_src: /srv/apps
