# proxmox_node/files/docker-compose.yml

---

services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    restart: unless-stopped
    mem_limit: 8g
    mem_reservation: 4g
    ports:
      - "8096:8096"
    environment:
      - TZ=Europe/Amsterdam
      - JELLYFIN_PublishedServerUrl=http://localhost:8096
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /srv/jellyfin/appdata:/config
      - /srv/jellyfin/cache:/cache
      - /srv/media/library:/ibrary # kids shows, family movies, etc
      - /srv/media/media:/media # youtube videos, photography videos
    privileged: true

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=Europe/Amsterdam
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # Check every 24 hours
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # node exporter is running outside docker.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true  # required for some metrics
