# proxmox_node/handlers/main.yml

---

- name: Restart node_exporter
  systemd:
    name: node_exporter
    state: restarted

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Restart ipmi_exporter
  systemd:
    name: ipmi_exporter
    state: restarted
    enabled: yes

- name: Restart pve_exporter
  systemd:
    name: pve_exporter
    state: restarted
    enabled: yes

- name: Restart Glances
  systemd:
    name: glances
    state: restarted
