# roles/upload_iso/tasks/main.yml
---
- name: Ensure ISO directory exists in project
  stat:
    path: "{{ playbook_dir }}/iso-images"
  register: iso_dir
  delegate_to: localhost
  become: false

- name: Fail if ISO directory is missing
  fail:
    msg: "Directory iso-images/ not found. Please create it and place the TrueNAS ISO inside."
  when: not iso_dir.stat.exists
  delegate_to: localhost
  become: false

- name: Find TrueNAS ISO file
  find:
    paths: "{{ playbook_dir }}/iso-images"
    patterns: "TrueNAS-SCALE-*.iso"
    use_regex: false
  register: found_isos
  delegate_to: localhost
  become: false

- name: Fail if no ISO is found
  fail:
    msg: "No TrueNAS ISO found in iso-images/. Please download it and place it there."
  when: found_isos.matched == 0
  delegate_to: localhost
  become: false

- name: Upload TrueNAS ISO to Proxmox (if not already present)
  copy:
    src: "{{ item.path }}"
    dest: "/var/lib/vz/template/iso/{{ item.path | basename }}"
    mode: '0644'
    force: no
  loop: "{{ found_isos.files }}" 
