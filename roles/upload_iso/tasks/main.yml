# roles/upload_iso/tasks/main.yml
---

# Uploads the latest TrueNAS ISO to proxmox if its not their already
# You have to download manually from TrueNas webiste onto your laptop.

- name: Ensure ISO directory exists in project
  file:
    path: "{{ playbook_dir }}/iso-images"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Find TrueNAS ISO file
  find:
    paths: "{{ playbook_dir }}/iso-images"
    patterns: "TrueNAS-SCALE-*.iso"
    use_regex: false
  register: found_isos
  delegate_to: localhost
  become: false

- name: Fail if no ISO is found
  fail:
    msg: "No TrueNAS ISO found in iso-images/. Please download it and place it there."
  when: found_isos.matched == 0
  delegate_to: localhost
  become: false

- name: Sort ISOs by filename (descending)
  set_fact:
    latest_iso: "{{ (found_isos.files | sort(attribute='path') | reverse)[0] }}"
  delegate_to: localhost
  become: false

- name: Ensure ISO directory exists on Proxmox
  file:
    path: /var/lib/vz/template/iso
    state: directory
    mode: '0755'
  delegate_to: pve
  become: true

- name: Upload latest TrueNAS ISO to Proxmox using rsync
  ansible.posix.synchronize:
    src: "{{ latest_iso.path }}"
    dest: "/var/lib/vz/template/iso/"
    mode: push
  delegate_to: localhost
  become: false
