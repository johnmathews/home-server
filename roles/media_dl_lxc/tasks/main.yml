- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify:
    - Update containers
    - Restart all containers

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  notify:
    - Update containers
    - Restart all containers

- name: Ensure qbittorrent data directory ownership
  file:
    path: /srv/apps/qbittorrent/data
    state: directory
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  notify:
    - Restart all containers

# 7. Handle qBittorrent config prep before container starts
- name: Re-create qbittorrent config directory
  file:
    path: "{{ base_dir }}/qBittorrent"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: '0755'
  when: reset_qbittorrent_config | default(false)

- name: Pre-seed qBittorrent.conf if missing and not resetting
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ base_dir }}/qBittorrent/qBittorrent.conf"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
    force: false  # Do not overwrite if already exists
  when: reset_qbittorrent_config | default(false)

