# roles/upload_cloud_image/tasks/main.yml
---
- name: Ensure cloud-image directory exists
  file:
    path: "{{ playbook_dir }}/cloud-images"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Download Ubuntu cloud image if not already present
  get_url:
    url: "{{ cloud_image_url }}"
    dest: "{{ playbook_dir }}/cloud-images/{{ cloud_image_filename }}"
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Ensure cloud image directory exists on Proxmox
  file:
    path: "/var/lib/vz/template/qemu"
    state: directory
    mode: '0755'

- name: Check if cloud image already exists on Proxmox
  stat:
    path: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
  register: cloud_image

- name: Upload Ubuntu cloud image to Proxmox
  copy:
    src: "{{ playbook_dir }}/cloud-images/{{ cloud_image_filename }}"
    dest: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    mode: '0644'
    force: no
  when: not cloud_image.stat.exists
