# roles/upload_cloud_image/tasks/main.yml
---

# Sets up an Ubuntu VM by downloading the ISO and uploading it to Proxmox

- name: Ensure cloud-image directory exists on localhost
  file:
    path: "{{ playbook_dir }}/cloud-images"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false

- name: Download Ubuntu cloud image if not already present
  get_url:
    url: "{{ cloud_image_url }}"
    dest: "{{ playbook_dir }}/cloud-images/{{ cloud_image_filename }}"
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Ensure cloud image directory exists on Proxmox
  file:
    path: "/var/lib/vz/template/qemu"
    state: directory
    mode: '0755'

- name: Check if cloud image already exists on Proxmox
  stat:
    path: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
  register: cloud_image

- name: Upload Ubuntu cloud image to Proxmox
  copy:
    src: "{{ playbook_dir }}/cloud-images/{{ cloud_image_filename }}"
    dest: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    mode: '0644'
    force: no
  when: not cloud_image.stat.exists

- name: Import Ubuntu cloud image as a disk for VM
  community.general.proxmox_disk:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars[inventory_hostname]['ansible_host'] }}"
    vmid: "{{ cloud_image_vmid }}"
    disk_image: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    storage: "{{ cloud_image_storage }}"
    format: raw
    state: present
  when: not cloud_image_disk_exists.stat.exists

- name: Check if disk was imported
  stat:
    path: "/var/lib/pve/images/{{ cloud_image_vmid }}/vm-{{ cloud_image_vmid }}-disk-0.raw"
  register: cloud_image_disk_exists
