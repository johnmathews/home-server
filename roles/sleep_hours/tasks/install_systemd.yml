- name: Install systemd service (unified template for pause, unpause, stop, start)
  become: true
  ansible.builtin.template:
    src: docker-sleep@.service
    dest: /etc/systemd/system/docker-sleep@.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart sleep-hours timers
  # This single template is used for all four operations via systemd templating:
  # docker-sleep@pause.service → %i=pause
  # docker-sleep@unpause.service → %i=unpause
  # docker-sleep@stop.service → %i=stop
  # docker-sleep@start.service → %i=start

- name: Install pause timer
  become: true
  ansible.builtin.template:
    src: docker-sleep@pause.timer.j2
    dest: /etc/systemd/system/docker-sleep@pause.timer
    owner: root
    group: root
    mode: '0644'
  notify: Restart sleep-hours timers

- name: Install unpause timer
  become: true
  ansible.builtin.template:
    src: docker-sleep@unpause.timer.j2
    dest: /etc/systemd/system/docker-sleep@unpause.timer
    owner: root
    group: root
    mode: '0644'
  notify: Restart sleep-hours timers

- name: Install stop timer
  become: true
  ansible.builtin.template:
    src: docker-sleep@stop.timer.j2
    dest: /etc/systemd/system/docker-sleep@stop.timer
    owner: root
    group: root
    mode: '0644'
  notify: Restart sleep-hours timers

- name: Install start timer
  become: true
  ansible.builtin.template:
    src: docker-sleep@start.timer.j2
    dest: /etc/systemd/system/docker-sleep@start.timer
    owner: root
    group: root
    mode: '0644'
  notify: Restart sleep-hours timers

- name: Remove legacy standalone stop and start service files
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/docker-sleep@stop.service
    - /etc/systemd/system/docker-sleep@start.service
  notify: Restart sleep-hours timers

- name: Enable and start timers
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - docker-sleep@pause.timer
    - docker-sleep@unpause.timer
    - docker-sleep@stop.timer
    - docker-sleep@start.timer
