---
- name: Install pause containers list
  become: true
  ansible.builtin.template:
    src: containers.list.j2
    dest: /etc/sleep-hours/containers.pause.list
    owner: root
    group: root
    mode: '0644'
  vars:
    container_list: "{{ sleep_hours_pause_containers | default([]) }}"
  when: sleep_hours_pause_containers is defined and sleep_hours_pause_containers | length > 0
  notify: Restart sleep-hours timers

- name: Install stop containers list
  become: true
  ansible.builtin.template:
    src: containers.list.j2
    dest: /etc/sleep-hours/containers.stop.list
    owner: root
    group: root
    mode: '0644'
  vars:
    container_list: "{{ sleep_hours_stop_containers | default([]) }}"
  when: sleep_hours_stop_containers is defined and sleep_hours_stop_containers | length > 0
  notify: Restart sleep-hours timers

- name: Remove legacy containers list
  become: true
  ansible.builtin.file:
    path: /etc/sleep-hours/containers.list
    state: absent

- name: Install Uptime Kuma container→monitor map
  become: true
  ansible.builtin.template:
    src: kuma.map.j2
    dest: /etc/sleep-hours/kuma.map
    owner: root
    group: root
    mode: '0644'
  when: sleep_hours_kuma_map is defined and sleep_hours_kuma_map | length > 0
  notify: Restart sleep-hours timers
