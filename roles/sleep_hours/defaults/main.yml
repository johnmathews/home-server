# Sleep Hours Feature Configuration Defaults
# Note: Most settings are in host_vars/<hostname>.yml
# This file only contains values that are truly shared across all hosts

# Docker stop timeout in seconds (graceful shutdown window)
sleep_hours_docker_stop_timeout_s: 30

# Docker log lines to include in error messages (configurable verbosity)
sleep_hours_docker_log_lines: 5

# TrueNAS API configuration (for Phase 3)
sleep_hours_truenas_api_url: "https://192.168.2.104"
sleep_hours_truenas_api_key: "{{ vault_truenas_api_key }}"

# Health check configuration
sleep_hours_container_health_timeout_s: 60 # Max wait for container health (seconds)
sleep_hours_container_health_interval_s: 2 # Poll interval (seconds)
