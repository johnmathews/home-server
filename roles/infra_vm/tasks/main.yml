# infra_vm/tasks/main.yml

---

- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - qemu-guest-agent
    state: present
    update_cache: yes

- name: Install Python 3 and pip
  apt:
    name:
      - python3
      - python3-pip
      - python-is-python3
    state: present

- name: Install pipx
  apt:
    name: pipx
    state: present

- name: Ensure pipx binary path is available
  shell: |
    pipx ensurepath
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ docker_user }}/.local/bin"
  become_user: "{{ docker_user }}"

- name: Install uv using pipx
  become: true
  become_user: "{{ docker_user }}"
  shell: |
    pipx install uv
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ docker_user }}/.local/bin"
  tags: [docker]

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags: [docker]

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
  tags: [docker]

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: latest
    update_cache: yes
  tags: [docker]

- name: Add user to docker group
  user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes
  tags: [docker]

- name: Create Docker Compose directory
  file:
    path: /srv/infra
    state: directory
    owner: "{{ docker_user }}"
    group: docker
    mode: '0755'
  tags: [docker]

- name: Ensure required directories exist
  file:
    path: "{{item}}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /srv/infra/grafana/config
    - /srv/infra/loki/data
    - /srv/infra/alloy/data
  tags: [docker, grafana, loki, alloy]
  notify: 
    - restart alloy
    - restart loki
    - restart grafana

- name: Template Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: /srv/infra/docker-compose.yml
    owner: "{{ docker_user }}"
    group: docker
    mode: '0644'
  notify: update docker compose stack
  tags: [docker, grafana, docs, loki, alloy]

- name: Upload .env file from template
  ansible.builtin.template:
    src: templates/.env.j2 
    dest: /srv/infra/.env  
    owner: "{{ docker_user }}"
    group: docker 
    mode: '0600'
  tags: [atuin, docker]

- name: Upload alloy and loki config files 
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{docker_user }}"
    group: "{{docker_user }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/infra/alloy/config.alloy 
    - loki:
      src: templates/loki-config.yml
      dest: /srv/infra/loki/config.yml 
  become: true
  tags: [docker, loki, alloy] 
  notify:
    - restart alloy
    - restart loki

- name: Include file-browser tasks 
  import_tasks: file-browser.yml
  tags: [file-browser, docker]

- name: Include homepage tasks
  import_tasks: homepage.yml
  tags: [homepage, docker]

- name: Include mkdocs tasks
  import_tasks: mkdocs.yml
  tags: [docs, docker]

- name: Launch containers
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: restarted
    recreate: always
    dependencies: true
    remove_orphans: true
  become: false
  tags: [docker, grafana, docs, loki, alloy]
