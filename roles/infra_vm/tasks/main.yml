# infra_vm/tasks/main.yml

- name: Preserve SSH host keys across reboots
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99_preserve_ssh_keys.cfg
    content: |
      ssh_deletekeys: false
      ssh_genkeytypes: []
    mode: '0644'

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - qemu-guest-agent
    state: present
    update_cache: true

- name: Install Python 3 and pip
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python-is-python3
    state: present

- name: Install pipx
  ansible.builtin.apt:
    name: pipx
    state: present

- name: Ensure pipx binary path is available
  ansible.builtin.shell: |
    pipx ensurepath
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ docker_user }}/.local/bin"
  become: true
  become_user: "{{ docker_user }}"

- name: Install uv using pipx
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.shell: |
    pipx install uv
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ docker_user }}/.local/bin"
  tags: [docker]

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags: [docker]

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
  tags: [docker]

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: latest
    update_cache: true
  tags: [docker]

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  tags: [docker]

- name: Ensure Docker config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: docker

- name: Configure Docker daemon min API version
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "min-api-version": "1.24"
      }
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker
  tags: docker

- name: Create Docker Compose directory
  ansible.builtin.file:
    path: /srv/infra
    state: directory
    owner: "{{ docker_user }}"
    group: docker
    mode: '0755'
  tags: docker, docserver

- name: Ensure required directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - {name: grafana, path: /srv/infra/grafana}
    - {name: loki, path: /srv/infra/loki/data}
    - {name: alloy, path: /srv/infra/alloy/data}
  loop_control:
    label: "{{ item.path }}"
  tags: [grafana, loki, alloy]
  notify: "Restart {{ item.name }}"

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /srv/infra/docker-compose.yml
    owner: "{{ docker_user }}"
    group: docker
    mode: '0644'
  notify: Update docker compose stack
  tags: docker, mikrotik_exporter, docserver

- name: Upload .env file from template
  ansible.builtin.template:
    src: templates/.env.j2
    dest: /srv/infra/.env
    owner: "{{ docker_user }}"
    group: docker
    mode: '0600'
  tags: atuin,docker

- name: Upload grafana config.ini
  ansible.builtin.template:
    src: files/grafana/grafana.ini
    dest: /srv/infra/grafana/grafana.ini
    owner: 472
    group: 472
    mode: '0600'
  notify: Restart grafana
  tags: grafana

- name: Upload alloy and loki config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/infra/alloy/config.alloy
    - loki:
      src: templates/loki-config.yml
      dest: /srv/infra/loki/config.yml
  become: true
  tags: [docker, loki, alloy]
  notify:
    - Restart alloy
    - Restart loki

- name: Include docserver tasks
  ansible.builtin.import_tasks: docserver.yml
  tags: docserver

- name: Include homepage tasks
  ansible.builtin.import_tasks: homepage.yml
  tags: homepage

- name: Include mkdocs tasks
  ansible.builtin.import_tasks: mkdocs.yml
  tags: docs, docker

- name: Include mikrotik_exporter tasks
  ansible.builtin.import_tasks: mikrotik_exporter.yml
  tags: mikrotik_exporter

- name: Launch containers
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: restarted
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false
  tags: docker, mikrotik_exporter, docserver
