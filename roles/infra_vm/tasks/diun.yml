- name: Create diun data directory
  ansible.builtin.file:
    path: /srv/infra/diun/data
    state: directory
    owner: "{{ docker_user }}"
    group: docker
    mode: '0755'

- name: Template diun watched-images file
  ansible.builtin.template:
    src: diun-images.yml.j2
    dest: /srv/infra/diun/images.yml
    owner: "{{ docker_user }}"
    group: docker
    mode: '0644'
  notify: Restart diun
