####################################
# Grafana configuration
####################################

[server]
# Listen on all interfaces inside the container
http_addr = 
http_port = 3000
root_url = %(protocol)s://charts.itsa.pizza/
serve_from_sub_path = false
enable_gzip = true

[security]
# Disable user signups, keep admin login local
disable_signout_menu = false
allow_embedding = true
cookie_secure = true

[users]
allow_sign_up = false

[database]
# Use SQLite (default) with WAL mode for fewer locks
type = sqlite3
path = /var/lib/grafana/grafana.db
wal = true

# (Optional: uncomment this to switch to Postgres later)
;type = postgres
;host = postgres:5432
;name = grafana
;user = grafana
;password = changeme

[analytics]
# Disable telemetry and update checks
reporting_enabled = false
check_for_updates = true
check_for_plugin_updates = true

[plugins]
preinstall = grafana-piechart-panel,grafana-worldmap-panel

[log]
# Keep logs clean — only warnings and above
; mode = console
; level = warn
; filters = error

[feature_toggles]
# Disable optional cloud/enterprise features you don't use
enable = publicDashboards
