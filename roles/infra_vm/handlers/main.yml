# infra_vm/handlers/main.yml

- name: Restart ipmi_exporter
  ansible.builtin.systemd:
    name: ipmi_exporter
    state: restarted

- name: Update docker compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart grafana
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services:
      - grafana
    state: present
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

