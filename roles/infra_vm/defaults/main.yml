# defaults/main.yml

docker_user: john
docker_compose_dir: /srv/infra

# Docker image versions
docserver_version: "latest"
documentation_ui_version: "latest"
gym_timer_version: "latest"
sre_assistant_version: "latest"
loki_version: "3.4.2"
alloy_version: "{{ sidecar_alloy_version }}"
mkdocs_material_version: "9.6.12"
homepage_version: "v1.12.1"
grafana_version: "latest"
node_exporter_version: "{{ sidecar_node_exporter_version }}"
cadvisor_version: "{{ sidecar_cadvisor_version }}"
uptime_kuma_version: "1.23.16"
dozzle_version: "v8.12.8"
portainer_ce_version: "latest"
mktxp_version: "latest"
container_status_exporter_version: "latest"
atuin_version: "v18.4.0"
diun_version: "latest"

# Diun (Docker image update notifier -> Pushover)
diun_schedule: "0 9 * * 1" # weekly check, Monday 09:00
# Reuses the pve Pushover application token. For a dedicated "Diun" app label in
# Pushover, create the app at pushover.net, add its token to vault, and swap here.
diun_pushover_token: "{{ vault_pushover_pve_application_token }}"
diun_pushover_user_key: "{{ vault_pushover_user_key }}"

smb_infra_vm_username: infra_vm

