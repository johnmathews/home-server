# roles/postfix/tasks/main.yml
---
- name: Install Postfix and mailutils
  apt:
    name:
      - postfix
      - mailutils
    state: present

- name: Configure Postfix
  debconf:
    name: postfix
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  with_items:
    - { question: 'postfix/mailname', value: 'proxmox.local', vtype: 'string' }
    - { question: 'postfix/main_mailer_type', value: 'Internet Site', vtype: 'string' }

- name: Set root forward email
  lineinfile:
    dest: /etc/aliases
    regexp: '^root:'
    line: "root: {{ email_address }}"
    create: yes
  notify: restart postfix

- name: Run newaliases
  command: newaliases
