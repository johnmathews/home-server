# Shell environment role defaults

# Neovim
shell_environment_neovim_enabled: true
shell_environment_neovim_config_style: "custom" # minimal, extended, custom
shell_environment_neovim_version: "v0.11.5"
shell_environment_neovim_install_dir: "/opt"
shell_environment_neovim_bin_dir: "/usr/local/bin"
shell_environment_neovim_deploy_docs: true # Deploy documentation files
shell_environment_neovim_deploy_scripts: true # Deploy development scripts
# Optional: Custom Python path for neovim python provider (defaults to ~/.pyenv/versions/3.10.12/envs/nvim/bin/python3)
# shell_environment_neovim_python_path: "/usr/bin/python3"

# Zsh
shell_environment_zsh_enabled: true
shell_environment_set_default_shell: true # Set to true in host_vars to change default shell
shell_environment_vim_mode_enabled: true # Enable vim keybindings in Zsh

# Oh My Zsh
shell_environment_omz_enabled: true
shell_environment_omz_plugins:
  - git
  - docker
  - kubectl
  - sudo
  - history
  - fzf
  - colored-man-pages
  - extract
  - zsh-autosuggestions
  - zsh-syntax-highlighting
shell_environment_omz_install_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"

# Powerlevel10k
shell_environment_p10k_enabled: true
shell_environment_p10k_repo: "https://github.com/romkatv/powerlevel10k.git"
shell_environment_p10k_style: "lean" # lean, classic, rainbow, pure

# Atuin shell history sync
shell_environment_atuin_enabled: true
shell_environment_atuin_integration: true
shell_environment_atuin_sync_address: "http://192.168.2.106:8888"
shell_environment_atuin_daemon: true
shell_environment_atuin_search_mode: "daemon-fuzzy"

# User targeting: Explicit users + auto-discovered users (UID >= 1000 with valid shell)
# Both lists are combined and deduplicated. Use this to add root or other users with UID < 1000.
# Format: username:home_dir:shell
shell_environment_shell_users: []

# CLI tools (apps.yml)
shell_environment_cli_tools_enabled: true
shell_environment_cli_tools:
  - htop
  - ffmpeg
  - 7zip
  - jq
  - poppler-utils
  - fd-find
  - ripgrep
  - fzf
  - zoxide
  - imagemagick
  - tree
  - bat
  - tmux
  - rsync

# uv Python package manager (installer script)
shell_environment_uv_enabled: true

# Shell aliases
shell_environment_aliases_enabled: true

# Git config (aliases + portable defaults), deployed as ~/.gitconfig_managed
# and included from each user's ~/.gitconfig (preserves existing identity)
shell_environment_git_config_enabled: true

# SSH directory setup
shell_environment_ssh_setup_enabled: false # User enables in host_vars if needed

# Yazi file manager (binary installation)
shell_environment_yazi_enabled: true
shell_environment_yazi_version: "v0.4.2"
shell_environment_yazi_arch: "x86_64-unknown-linux-gnu"
shell_environment_yazi_install_dir: "/opt"
shell_environment_yazi_bin_dir: "/usr/local/bin"

# eza modern ls replacement (binary installation)
shell_environment_eza_enabled: true
shell_environment_eza_version: "v0.20.14" # Latest stable as of Dec 2024
shell_environment_eza_arch: "x86_64-unknown-linux-gnu"
shell_environment_eza_install_dir: "/opt"
shell_environment_eza_bin_dir: "/usr/local/bin"

# Lazygit (binary installation)
shell_environment_lazygit_enabled: true
shell_environment_lazygit_version: "v0.60.0"
shell_environment_lazygit_bin_dir: "/usr/local/bin"

# Node.js (NodeSource repository)
shell_environment_nodejs_enabled: true
shell_environment_nodejs_major_version: "20" # LTS - Iron (until April 2026)
