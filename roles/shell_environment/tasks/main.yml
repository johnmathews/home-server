---
# Shell environment orchestrator

- name: Discover users with home directories
  ansible.builtin.shell: |
    set -o pipefail
    getent passwd | awk -F: '$3 >= 1000 && $7 !~ /nologin|false/ {print $1":"$6":"$7}'
  args:
    executable: /bin/bash
  register: shell_users_raw
  changed_when: false
  tags: [always]

- name: Set target users (explicit + discovered, deduplicated)
  ansible.builtin.set_fact:
    target_shell_users: "{{ ((shell_environment_shell_users + (shell_users_raw.stdout_lines | default([]))) | reject('equalto', '') | select('match', '^[^:]+:[^:]+:[^:]+$') | list | unique) }}"
  tags: [always]

- name: Install shell environment prerequisites
  ansible.builtin.apt:
    name:
      - git
      - acl
    state: present
    update_cache: true
  tags: [always]

- name: Install Neovim
  ansible.builtin.import_tasks: neovim.yml
  when: shell_environment_neovim_enabled | bool
  tags: [neovim, editor]

- name: Install Node.js from NodeSource
  ansible.builtin.import_tasks: nodejs.yml
  when: shell_environment_nodejs_enabled | bool
  tags: [nodejs, development, apps]

- name: Install yazi file manager
  ansible.builtin.import_tasks: yazi.yml
  when: shell_environment_yazi_enabled | bool
  tags: [yazi, file-manager, apps]

- name: Install eza modern ls replacement
  ansible.builtin.import_tasks: eza.yml
  when: shell_environment_eza_enabled | bool
  tags: [eza, ls, apps]

- name: Install lazygit
  ansible.builtin.import_tasks: lazygit.yml
  when: shell_environment_lazygit_enabled | bool
  tags: [lazygit, git, apps]

- name: Install and configure Zsh
  ansible.builtin.import_tasks: zsh.yml
  when: shell_environment_zsh_enabled | bool
  tags: [zsh, shell]

- name: Install Oh My Zsh
  ansible.builtin.import_tasks: oh-my-zsh.yml
  when: shell_environment_omz_enabled | bool
  tags: [omz, oh-my-zsh, shell]

- name: Install Oh My Zsh third-party plugins
  ansible.builtin.import_tasks: omz-plugins.yml
  when: shell_environment_omz_enabled | bool
  tags: [omz, oh-my-zsh, shell]

- name: Install Powerlevel10k
  ansible.builtin.import_tasks: powerlevel10k.yml
  when: shell_environment_p10k_enabled | bool
  tags: [p10k, powerlevel10k, theme]

- name: Install and configure Atuin
  ansible.builtin.import_tasks: atuin.yml
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Install uv Python package manager
  ansible.builtin.import_tasks: uv.yml
  when: shell_environment_uv_enabled | bool
  tags: [uv, python, apps]

- name: Configure shell integration
  ansible.builtin.import_tasks: shell-integration.yml
  tags: [integration, shell]

- name: Install additional CLI tools and configurations
  ansible.builtin.import_tasks: apps.yml
  tags: [apps, tools]
