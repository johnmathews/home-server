---
# Install third-party Oh My Zsh plugins (per-user)

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: "https://github.com/zsh-users/zsh-autosuggestions.git"
    dest: "{{ item.split(':')[1] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    version: master
  become: true
  become_user: "{{ item.split(':')[0] }}"
  loop: "{{ target_shell_users }}"

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    dest: "{{ item.split(':')[1] }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    version: master
  become: true
  become_user: "{{ item.split(':')[0] }}"
  loop: "{{ target_shell_users }}"
