# shell_environment/tasks/atuin.yml

---
# Install and configure Atuin shell history sync

- name: Ensure Atuin is installed
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
  args:
    executable: /bin/bash
    creates: /root/.atuin/bin/atuin
  environment:
    ATUIN_DONT_PRINT_WELCOME: "1"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Create symlink to make atuin available system-wide
  ansible.builtin.file:
    src: /root/.atuin/bin/atuin
    dest: /usr/local/bin/atuin
    state: link
    force: true
  become: true
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Ensure Atuin config directory exists for each user
  ansible.builtin.file:
    path: "{{ item.split(':')[1] }}/.config/atuin"
    state: directory
    mode: '0755'
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
  loop: "{{ target_shell_users }}"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Deploy Atuin configuration
  ansible.builtin.template:
    src: atuin-config.toml.j2
    dest: "{{ item.split(':')[1] }}/.config/atuin/config.toml"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    backup: true
  loop: "{{ target_shell_users }}"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell, config]
