# shell_environment/tasks/atuin.yml

# Install and configure Atuin shell history sync

- name: Ensure Atuin is installed system-wide
  ansible.builtin.shell: |
    set -e
    export ATUIN_DONT_PRINT_WELCOME=1
    # Skip if atuin is already the desired version
    if [ -f /usr/local/bin/atuin ] && [ ! -L /usr/local/bin/atuin ] && /usr/local/bin/atuin --version 2>/dev/null | grep -q '{{ atuin_version | regex_replace("^v", "") }}'; then
      exit 0
    fi
    # Remove broken symlink if present
    rm -f /usr/local/bin/atuin
    curl --proto "=https" --tlsv1.2 -LsSf https://github.com/atuinsh/atuin/releases/download/{{ atuin_version }}/atuin-installer.sh | sh -s -- --no-modify-path
    if [ -d /root/.atuin ]; then
      install -m 755 /root/.atuin/bin/atuin /usr/local/bin/atuin
    fi
  args:
    executable: /bin/bash
  become: true
  register: atuin_install
  changed_when: "'exit 0' not in atuin_install.stdout"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Ensure Atuin config directory exists for each user
  ansible.builtin.file:
    path: "{{ item.split(':')[1] }}/.config/atuin"
    state: directory
    mode: '0755'
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
  loop: "{{ target_shell_users }}"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell]

- name: Deploy Atuin configuration
  ansible.builtin.template:
    src: atuin-config.toml.j2
    dest: "{{ item.split(':')[1] }}/.config/atuin/config.toml"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    backup: true
  loop: "{{ target_shell_users }}"
  when: shell_environment_atuin_enabled | bool
  tags: [atuin, shell, config]
