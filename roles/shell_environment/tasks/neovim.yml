---
# Neovim installation and configuration

- name: Ensure Node.js is installed for Mason LSP servers
  ansible.builtin.assert:
    that:
      - shell_environment_nodejs_enabled | bool
    fail_msg: "Neovim requires Node.js for Mason LSP servers. Enable shell_environment_nodejs_enabled."
    quiet: true

- name: Remove old Neovim from apt if present
  ansible.builtin.apt:
    name: neovim
    state: absent
  become: true

- name: Install build tools for native plugins
  ansible.builtin.apt:
    name:
      - build-essential
      - cmake
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install dependencies for Mason LSP servers
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Check if Neovim is already installed with correct version
  ansible.builtin.stat:
    path: "{{ shell_environment_neovim_install_dir }}/nvim-{{ shell_environment_neovim_version }}/usr/bin/nvim"
  register: nvim_installed
  become: true

- name: Map architecture to Neovim naming convention
  ansible.builtin.set_fact:
    neovim_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"

- name: Download Neovim AppImage
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/download/{{ shell_environment_neovim_version }}/nvim-linux-{{ neovim_arch }}.appimage"
    dest: "/tmp/nvim-{{ shell_environment_neovim_version }}.appimage"
    mode: '0755'
    timeout: 120
  become: true
  when: not nvim_installed.stat.exists
  register: nvim_download
  retries: 3
  delay: 5
  until: nvim_download is succeeded

- name: Extract Neovim AppImage
  ansible.builtin.command:
    cmd: "/tmp/nvim-{{ shell_environment_neovim_version }}.appimage --appimage-extract"
    chdir: "/tmp"
    creates: "/tmp/squashfs-root/usr/bin/nvim"
  become: true
  when: nvim_download is changed or not nvim_installed.stat.exists

- name: Move extracted Neovim to install directory
  ansible.builtin.command:
    cmd: >-
      mv /tmp/squashfs-root
      {{ shell_environment_neovim_install_dir }}/nvim-{{ shell_environment_neovim_version }}
    creates: "{{ shell_environment_neovim_install_dir }}/nvim-{{ shell_environment_neovim_version }}/usr/bin/nvim"
  become: true
  when: nvim_download is changed or not nvim_installed.stat.exists

- name: Create symlink for nvim binary
  ansible.builtin.file:
    src: "{{ shell_environment_neovim_install_dir }}/nvim-{{ shell_environment_neovim_version }}/usr/bin/nvim"
    dest: "{{ shell_environment_neovim_bin_dir }}/nvim"
    state: link
    force: true
  become: true

- name: Remove AppImage download
  ansible.builtin.file:
    path: "/tmp/nvim-{{ shell_environment_neovim_version }}.appimage"
    state: absent
  become: true
  when: nvim_download is changed or not nvim_installed.stat.exists

- name: Create Neovim config directory for each user
  ansible.builtin.file:
    path: "{{ item.split(':')[1] }}/.config/nvim"
    state: directory
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  tags: [nvim]

- name: Create Neovim subdirectories
  ansible.builtin.file:
    path: "{{ item[0].split(':')[1] }}/.config/nvim/{{ item[1] }}"
    state: directory
    owner: "{{ item[0].split(':')[0] }}"
    group: "{{ item[0].split(':')[0] }}"
    mode: '0755'
  with_nested:
    - "{{ target_shell_users }}"
    - ['lua', 'lua/plugins', 'lua/snippets', 'ftplugin', 'docs', 'scripts']
  become: true
  tags: [nvim]

- name: Deploy Neovim core lua modules
  ansible.builtin.copy:
    src: "nvim-custom/lua/{{ item[1] }}"
    dest: "{{ item[0].split(':')[1] }}/.config/nvim/lua/{{ item[1] }}"
    owner: "{{ item[0].split(':')[0] }}"
    group: "{{ item[0].split(':')[0] }}"
    mode: '0644'
  loop: "{{ target_shell_users | product(['options.lua', 'plugins.lua', 'functions.lua', 'mappings.lua', 'autocmd.lua', 'colorscheme.lua']) | list }}"
  become: true
  tags: [nvim]

- name: Deploy Neovim plugin configurations
  ansible.builtin.copy:
    src: "nvim-custom/lua/plugins/"
    dest: "{{ item.split(':')[1] }}/.config/nvim/lua/plugins/"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    directory_mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  tags: [nvim]

- name: Deploy Neovim snippet files
  ansible.builtin.copy:
    src: "nvim-custom/lua/snippets/"
    dest: "{{ item.split(':')[1] }}/.config/nvim/lua/snippets/"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    directory_mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  tags: [nvim]

- name: Deploy Neovim main configuration (init.lua)
  ansible.builtin.template:
    src: init.lua.j2
    dest: "{{ item.split(':')[1] }}/.config/nvim/init.lua"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
  loop: "{{ target_shell_users }}"
  become: true
  tags: [nvim]

- name: Deploy Neovim filetype plugins
  ansible.builtin.copy:
    src: "nvim-custom/ftplugin/"
    dest: "{{ item.split(':')[1] }}/.config/nvim/ftplugin/"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    directory_mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  tags: [nvim]

- name: Deploy Neovim documentation
  ansible.builtin.copy:
    src: "nvim-custom/docs/"
    dest: "{{ item.split(':')[1] }}/.config/nvim/docs/"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0644'
    directory_mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  when: shell_environment_neovim_deploy_docs | bool
  tags: [nvim]

- name: Deploy Neovim support files
  ansible.builtin.copy:
    src: "nvim-custom/{{ item[1] }}"
    dest: "{{ item[0].split(':')[1] }}/.config/nvim/{{ item[1] }}"
    owner: "{{ item[0].split(':')[0] }}"
    group: "{{ item[0].split(':')[0] }}"
    mode: '0644'
  loop: "{{ target_shell_users | product(['README.md', 'AGENTS.md', 'lazy-lock.json', 'stylua.toml']) | list }}"
  become: true
  when: shell_environment_neovim_config_style == 'custom'
  tags: [nvim]

- name: Deploy Neovim development scripts
  ansible.builtin.copy:
    src: "nvim-custom/scripts/"
    dest: "{{ item.split(':')[1] }}/.config/nvim/scripts/"
    owner: "{{ item.split(':')[0] }}"
    group: "{{ item.split(':')[0] }}"
    mode: '0755'
    directory_mode: '0755'
  loop: "{{ target_shell_users }}"
  become: true
  when: shell_environment_neovim_deploy_scripts | bool
  tags: [nvim]
