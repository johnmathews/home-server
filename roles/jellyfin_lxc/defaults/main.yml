TZ: Europe/Amsterdam
proxmox_api_user: "api@pve"

puid: 1001
guid: 1001

smb_username: smb_user
smb_server: 192.168.2.104
smb_shares:
  - name: library 
    target: /mnt/media/library
    mountpoint: /mnt/media/library
  - name: media 
    target: /mnt/media/media
    mountpoint: /mnt/media/media
  - name: youtube-kids 
    target: /mnt/youtube-kids
    mountpoint: /mnt/media/youtube-kids


truenas_ip: "192.168.2.104"

nfs_opts_items:
  - _netdev
  - hard
  - nofail
  - proto=tcp
  - retrans=2
  - timeo=150
  - vers=4.2
  - x-systemd.automount
  - x-systemd.idle-timeout=60s

nfs_opts: "{{ nfs_opts_items | join(',') }}"

nfs_shares:
  - name: library
    mountpoint: /mnt/nfs/library
    target: /mnt/tank/library
  - name: media
    mountpoint: /mnt/nfs/media
    target: /mnt/tank/media
  - name: youtube-kids
    mountpoint: /mnt/nfs/youtube-kids
    target: /mnt/tank/youtube-kids
