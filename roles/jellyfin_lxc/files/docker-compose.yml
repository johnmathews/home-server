# jellyfin_lxc/files/docker-compose.yml

---

services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    restart: always
    mem_limit: 8g
    mem_reservation: 4g
    # user: "1001:1001" # this breaks volume mounts
    ports:
      - "8096:8096"
    environment:
      - TZ=Europe/Amsterdam
      - JELLYFIN_PublishedServerUrl=http://192.168.2.110:8096
      - PUID=1001
      - PGID=1001
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /srv/apps/jellyfin/plugins/tubearchivist_metadata:/config/plugins/TubeArchivistMetadataKids_1.3.19.0
      - /srv/apps/jellyfin/appdata:/config
      - /srv/apps/jellyfin/cache:/cache
      - /mnt/media/library:/library # kids shows, family movies, etc
      - /mnt/media/media:/media # youtube videos, photography videos
      - /mnt/nfs/youtube-kids:/youtube-kids # tubearchivist lib must be readonly
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    privileged: true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true  # required for some metrics

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'

