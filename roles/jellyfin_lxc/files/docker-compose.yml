# jellyfin_lxc/files/docker-compose.yml
services:

  portainer-agent:
    image: portainer/agent:2.39.1 # static file: keep in sync with portainer_agent_version
    container_name: portainer_agent
    restart: always
    environment:
      # from /srv/apps/.env (deployed by the role); only the Portainer server can control this agent
      AGENT_SECRET: "${PORTAINER_AGENT_SECRET}"
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jellyfin:
    # image: dockerfile uses the official image and adds yt-dlp
    build:
      context: ./
      dockerfile: Dockerfile
    image: jellyfin-with-yt-dlp:latest
    container_name: jellyfin
    restart: always
    init: true
    # LXC has 6g total. mem_limit MUST stay below that (minus ~1g for the other
    # containers + system), or a runaway ffprobe/ffmpeg exhausts the whole LXC and
    # the box thrashes for 10-20 min before the OOM killer fires (2026-07 brownouts).
    # With a 4g cap the kernel kills the offender inside this cgroup within seconds.
    mem_limit: 4g
    mem_reservation: 1g
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    environment:
      - TZ=Europe/Amsterdam
      - JELLYFIN_PublishedServerUrl=http://192.168.2.110:8096
      - PUID=1001
      - PGID=1001
    group_add:
      - "video"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      # tmpfs pages are charged against this container's mem_limit (4g) —
      # keep transcode tmpfs well below it so heavy transcodes can't OOM the container
      - type: tmpfs
        target: /transcode
        tmpfs:
          size: 2g
      - /srv/apps/jellyfin/appdata:/config
      - /srv/apps/jellyfin/cache:/cache
      - /mnt/nfs/library:/library # kids shows, family movies, etc
      - /mnt/nfs/media:/media
      - /mnt/nfs/movies:/movies
      - /mnt/nfs/youtube-kids:/youtube-kids:ro # tubearchivist lib must be readonly
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --connect-timeout 2 http://127.0.0.1:8096/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  alloy:
    # static file: keep this pin in sync with sidecar_alloy_version (group_vars/all/main.yml)
    image: grafana/alloy:v1.5.1
    container_name: alloy
    restart: unless-stopped
    mem_limit: 512m  # ~50 MiB typical; cap so no sidecar can starve the 6 GB LXC
    environment:
      LOKI_WRITE_ENDPOINT: "http://192.168.2.106:3100/loki/api/v1/push"
      NODE_HOSTNAME: "jellyfin"
      LOG_LEVEL: "warn"
    volumes:
      # config
      - ./alloy:/etc/alloy:ro
      # docker
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # journalctl
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--stability.level=experimental"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    ports:
      - "12345:12345"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    mem_limit: 512m  # ~36 MiB typical
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
    privileged: false # required for some metrics, but `true` makes it scan /dev/** and in an LXC /dev/series/by-id does not exist.
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: node_exporter
    mem_limit: 128m  # ~10 MiB typical
    command:
      - '--path.rootfs=/host'
      - '--collector.textfile.directory=/textfile'
    ports:
      - "9100:9100"
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
      - '/var/lib/node_exporter/textfile_collector:/textfile:ro'
