# jellyfin_lxc/files/docker-compose.yml

---

services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    restart: always
    mem_limit: 8g
    mem_reservation: 4g
    ports:
      - "8096:8096"
    environment:
      - TZ=Europe/Amsterdam
      - JELLYFIN_PublishedServerUrl=http://192.168.2.110:8096
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /srv/apps/jellyfin/plugins/tubearchivist_metadata:/config/plugins/TubeArchivistMetadataKids_1.3.19.0
      - /srv/apps/jellyfin/appdata:/config
      - /srv/apps/jellyfin/cache:/cache
      - /mnt/media/library:/library # kids shows, family movies, etc
      - /mnt/media/media:/media # youtube videos, photography videos
      - /mnt/youtube-kids:/youtube-kids # tubearchivist lib must be readonly
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    privileged: true

  # node exporter is running outside docker.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "18080:8080"
    command:
      - --housekeeping_interval=15s
      - --max_housekeeping_interval=15s
      - --global_housekeeping_interval=15s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true  # required for some metrics
