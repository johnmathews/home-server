- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/jellyfin/appdata
    - /srv/apps/jellyfin/cache
    - /srv/apps/alloy
  notify: Restart docker
  tags: [docker, alloy]

- name: Upload alloy config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: files/config.alloy
      dest: /srv/apps/alloy/config.alloy
  become: true
  tags: docker,alloy
  notify: Restart alloy

- name: Copy dockerfile
  ansible.builtin.copy:
    src: dockerfile
    dest: /srv/apps/dockerfile
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker
  tags: docker

- name: Copy Docker Compose file
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /srv/apps/docker-compose.yml
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker
  tags: docker,alloy
