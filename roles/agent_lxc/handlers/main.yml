---

- name: Restart all containers
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    state: present
    build: always
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart syncthing
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services:
      - syncthing
    state: present
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart alloy
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services:
      - alloy
    state: present
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

- name: Rebuild mkdocs
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services: "{{ mkdocs_sites | map(attribute='name') | map('regex_replace', '^', 'mkdocs-') | list }}"
    state: present
    build: always
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart nanoclaw
  ansible.builtin.systemd:
    name: nanoclaw
    state: restarted
    scope: user
  become: true
  become_user: john
  environment:
    XDG_RUNTIME_DIR: /run/user/1000

- name: Restart mkdocs
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services: "{{ mkdocs_sites | map(attribute='name') | map('regex_replace', '^', 'mkdocs-') | list }}"
    state: present
    recreate: always
    pull: never
    dependencies: true
    remove_orphans: true
  become: false
