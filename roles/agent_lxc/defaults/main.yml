# Docker image versions
relay_version: "latest"
syncthing_version: "latest"

# Synced folder roots under /srv/apps/syncthing; each gets the shared .stignore
syncthing_folders:
  - horizons
  - relay
  - meeting-assistant
  - screenshots
cadvisor_version: "latest"
alloy_version: "latest"
node_exporter_version: "latest"

mkdocs_sites:
  - name: journal
    site_name: NanoClaw Journal
    docs_path: /srv/apps/nanoclaw/journal
    port: 8000
    order: desc
    date_titles: true
  - name: docs
    site_name: NanoClaw Docs
    docs_path: /srv/apps/nanoclaw/docs
    port: 8001
