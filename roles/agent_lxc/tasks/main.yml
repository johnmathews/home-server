---

- name: Create john user
  ansible.builtin.user:
    name: john
    shell: /bin/bash
    create_home: true
    state: present

- name: Create base app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ docker_compose_dir }}"
    - /srv/apps/alloy

- name: Create syncthing config directory
  ansible.builtin.file:
    path: /srv/apps/syncthing
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000
  tags: syncthing

- name: Upload alloy config
  ansible.builtin.copy:
    src: templates/config.alloy
    dest: /srv/apps/alloy/config.alloy
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  become: true
  tags: alloy
  notify:
    - restart alloy

- name: Upload syncthing .stignore
  ansible.builtin.template:
    src: templates/syncthing-stignore.j2
    dest: /srv/apps/nanoclaw/.stignore
    owner: 1000
    group: 1000
    mode: '0644'
  become: true
  tags: syncthing

- name: Create mkdocs config directories
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/mkdocs/{{ item.name }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ mkdocs_sites }}"
  tags: docs

- name: Copy mkdocs Dockerfile
  ansible.builtin.template:
    src: templates/mkdocs.Dockerfile.j2
    dest: "{{ docker_compose_dir }}/mkdocs/Dockerfile"
    mode: '0644'
    owner: root
    group: root
  tags: docs
  notify:
    - rebuild mkdocs

- name: Copy mkdocs entrypoint script
  ansible.builtin.template:
    src: templates/mkdocs-entrypoint.sh.j2
    dest: "{{ docker_compose_dir }}/mkdocs/entrypoint.sh"
    mode: '0755'
    owner: root
    group: root
  tags: docs
  notify:
    - rebuild mkdocs

- name: Template mkdocs.yml for each site
  ansible.builtin.template:
    src: templates/mkdocs.yml.j2
    dest: "{{ docker_compose_dir }}/mkdocs/{{ item.name }}/mkdocs.yml"
    mode: '0644'
    owner: root
    group: root
  loop: "{{ mkdocs_sites }}"
  vars:
    mkdocs_site_name: "{{ item.site_name }}"
    mkdocs_date_titles: "{{ item.date_titles | default(false) }}"
  tags: docs
  notify:
    - restart mkdocs

- name: Create mkdocs hooks directory
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/mkdocs/hooks"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: docs
  when: mkdocs_sites | selectattr('date_titles', 'defined') | list | length > 0

- name: Copy date-titles hook script
  ansible.builtin.template:
    src: templates/mkdocs-date-titles.py.j2
    dest: "{{ docker_compose_dir }}/mkdocs/hooks/date-titles.py"
    mode: '0644'
    owner: root
    group: root
  tags: docs
  notify:
    - restart mkdocs

- name: Template .pages file for sites with custom ordering
  ansible.builtin.template:
    src: templates/mkdocs-pages.j2
    dest: "{{ docker_compose_dir }}/mkdocs/{{ item.name }}/.pages"
    mode: '0644'
    owner: root
    group: root
  loop: "{{ mkdocs_sites | selectattr('order', 'defined') }}"
  vars:
    mkdocs_order: "{{ item.order }}"
  tags: docs
  notify:
    - restart mkdocs

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  tags: docker, docs
  notify:
    - restart all containers
