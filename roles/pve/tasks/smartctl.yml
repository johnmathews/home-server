# Run this before the imported Smartctl exporter role. GNU Tar must be running on the local ansible host
- name: Check for GNU tar when running tasks locally
  when: inventory_hostname == 'localhost' or delegate_to is defined and delegate_to == 'localhost'
  tags: [metrics]
  block:
    - name: Check if GNU tar (gtar) is available
      ansible.builtin.command: which gtar
      register: gnu_tar_check
      failed_when: gnu_tar_check.rc != 0
      changed_when: false

    - name: Warn if GNU tar not found in PATH
      ansible.builtin.fail:
        msg: |
          GNU tar (gtar) is required for this role to work locally.
          Install it using: brew install gnu-tar
          And add to your PATH: export PATH="/opt/homebrew/opt/gnu-tar/libexec/gnubin:$PATH"
      when: gnu_tar_check.rc != 0

- name: Install & configure Prometheus Smartctl Exporter
  ansible.builtin.import_role:
    name: prometheus.prometheus.smartctl_exporter
  vars:
    # Run as root without a systemd drop-in
    smartctl_exporter_system_user: root
    smartctl_exporter_system_group: root

    # Scrape pacing
    smartctl_exporter_smartctl_interval: "60s"
    smartctl_exporter_smartctl_rescan: "10m"

    # Only the disks you want on the Proxmox host (examples)
    # Prefer /dev/disk/by-id for stability across reboots
    smartctl_exporter_smartctl_devices:
      - /dev/disk/by-id/ata-ST3000DM007-1WY10G_ZFN1TN5X

- name: Ensure smartctl_exporter is started and enabled
  become: true
  ansible.builtin.systemd:
    name: smartctl_exporter
    state: started
    enabled: true
    daemon_reload: true
