# proxmox_node/tasks/glances.yml

---

- name: Ensure Python build dependencies are installed
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-full
      - gcc
      - lm-sensors
    state: present
    update_cache: true

- name: Create Glances virtualenv directory
  ansible.builtin.file:
    path: /opt/glances-venv
    state: directory
    mode: '0755'

- name: Create a virtual environment using uv
  ansible.builtin.command: uv venv /opt/glances-venv
  args:
    creates: /opt/glances-venv/pyvenv.cfg

- name: Get Python major.minor version in Glances venv
  ansible.builtin.command: /opt/glances-venv/bin/python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
  register: glances_python_version
  changed_when: false

- name: Install Glances and dependencies in virtualenv using uv
  ansible.builtin.command: >
    uv pip install --python /opt/glances-venv/bin/python 'glances[all]' fastapi uvicorn jinja2
  args:
    creates: /opt/glances-venv/bin/glances

- name: Ensure jinja2 is installed in Glances venv
  ansible.builtin.command: >
    uv pip install --python /opt/glances-venv/bin/python jinja2
  args:
    creates: "/opt/glances-venv/lib/python{{ glances_python_version.stdout }}/site-packages/jinja2"

- name: Create Glances systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/glances.service
    content: |
      [Unit]
      Description=Glances
      After=network.target

      [Service]
      ExecStart=/opt/glances-venv/bin/glances  -w  --bind 0.0.0.0
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart Glances

- name: Enable and start Glances
  ansible.builtin.systemd:
    name: glances
    enabled: true
    state: started
