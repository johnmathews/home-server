# proxmox_node/handlers/main.yml

---

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart ipmi_exporter
  ansible.builtin.systemd:
    name: ipmi_exporter
    state: restarted
    enabled: true

- name: Restart pve_exporter
  ansible.builtin.systemd:
    name: pve_exporter
    state: restarted
    enabled: true

- name: Restart Glances
  ansible.builtin.systemd:
    name: glances
    state: restarted

- name: Restart nut-server
  ansible.builtin.systemd:
    name: nut-server
    state: restarted
    enabled: true

- name: Restart nut-monitor
  ansible.builtin.systemd:
    name: nut-monitor
    state: restarted
    enabled: true

- name: Systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart ups-battery-monitor.timer
  ansible.builtin.systemd:
    name: ups-battery-monitor.timer
    state: restarted
    enabled: true

- name: Restart smartctl_exporter
  become: true
  ansible.builtin.systemd:
    name: smartctl_exporter
    state: restarted

- name: Restart hd-idle
  become: true
  ansible.builtin.systemd:
    name: hd-idle
    state: restarted

- name: Restart alloy
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_dir }}"
    services:
      - alloy
    state: present
    recreate: always
    dependencies: true
  become: false
