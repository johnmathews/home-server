# homeassistant_vm/tasks/provision.yml

---

- name: Set Home Assistant variables
  set_fact:
    ha_vm_config: "{{ hostvars['homeassistant']['vm_config'] }}"
  delegate_to: pve

- name: Set proxmox API facts explicitly
  set_fact:
    proxmox_api_host: "{{ hostvars['homeassistant']['ansible_host'] }}"
    proxmox_node: "{{ proxmox_node_name }}"
  delegate_to: pve

- name: Check if VM exists
  community.general.proxmox_vm_info:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    node: "{{ proxmox_node_name }}"
  register: vm_info
  delegate_to: pve

- name: Get latest Home Assistant OS release metadata
  uri:
    url: https://api.github.com/repos/home-assistant/operating-system/releases/latest
    return_content: yes
  register: haos_release
  delegate_to: pve

- name: Set Home Assistant OS version
  set_fact:
    haos_version: "{{ haos_release.json.tag_name }}"
  delegate_to: pve

- name: Check if OVA already exists
  stat:
    path: "/var/lib/vz/template/qemu/haos_ova-{{ haos_version }}.ova"
  register: disk_stat
  delegate_to: pve

- name: Download Home Assistant OVA archive ({{ haos_version }})
  get_url:
    url: "https://github.com/home-assistant/operating-system/releases/download/{{ haos_version }}/haos_ova-{{ haos_version }}.ova"
    dest: "/var/lib/vz/template/qemu/haos_ova-{{ haos_version }}.ova"
    mode: '0644'
  when: not disk_stat.stat.exists
  delegate_to: pve

- name: Extract VMDK image from OVA
  command: >
    tar -xf /var/lib/vz/template/qemu/haos_ova-{{ haos_version }}.ova -C /var/lib/vz/template/qemu/
  args:
    creates: "/var/lib/vz/template/qemu/haos_ova-{{ haos_version }}.ovf"
  delegate_to: pve

- name: Find extracted VMDK file
  find:
    paths: "/var/lib/vz/template/qemu/"
    patterns: "*.vmdk"
    age: 60s
  register: vmdk_files
  delegate_to: pve

- name: Fail if VMDK file not found
  fail:
    msg: "Could not find extracted VMDK file for HAOS"
  when: vmdk_files.files | length == 0
  delegate_to: pve

- name: Create Home Assistant VM
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ ha_vm_config.vmid }}"
    name: "{{ ha_vm_config.vm_name }}"
    cores: 2
    memory: 4096
    ostype: l26
    scsihw: virtio-scsi-pci
    onboot: true
    state: present 
    boot: order=scsi0
    bootdisk: scsi0
    efidisk0: "local-lvm:1,format=raw,efitype=4m,pre-enrolled-keys=0"
  when: ha_vm_config.vm_name not in (vm_info.proxmox_vms | map(attribute='name') | list)
  delegate_to: pve

- name: Import VMDK disk into Home Assistant VM
  command: >
    qm importdisk {{ ha_vm_config.vmid }} {{ vmdk_files.files[0].path }} local-lvm
  delegate_to: pve

- name: Attach imported disk to VM
  command: >
    qm set {{ ha_vm_config.vmid }} --scsi0 local-lvm:vm-{{ ha_vm_config.vmid }}-disk-0
  delegate_to: pve

- name: Set static IP via cloud-init (optional step - HA may ignore this)
  command: >
    qm set {{ ha_vm_config.vmid }} --ipconfig0 {{ ha_vm_config.ipconfig0 }}
  delegate_to: pve
