# roles/key_server/tasks/main.yml

---

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - jq
      - software-properties-common
    state: present
    update_cache: true

- name: Install Python 3 and pip
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python-is-python3
    state: present

- name: Install pipx
  ansible.builtin.apt:
    name: pipx
    state: present

- name: Ensure pipx binary path is available
  ansible.builtin.shell: |
    pipx ensurepath
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ server_user }}/.local/bin"
  become: true
  become_user: "{{ server_user }}"

- name: Install uv using pipx
  become: true
  become_user: "{{ server_user }}"
  ansible.builtin.shell: |
    pipx install uv
  environment:
    PATH: "{{ ansible_env.PATH }}:/home/{{ server_user }}/.local/bin"

- name: Create app directory
  ansible.builtin.file:
    path: /opt/key_server
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0755'

- name: Upload FastAPI app
  ansible.builtin.template:
    src: key-server-main.py.j2
    dest: /opt/key_server/main.py
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0644'

- name: Create virtual environment using uv
  become: true
  become_user: "{{ server_user }}"
  ansible.builtin.shell: |
    /home/{{ server_user }}/.local/bin/uv venv /opt/key_server/.venv
  args:
    creates: /opt/key_server/.venv
  environment:
    PATH: "/home/{{ server_user }}/.local/bin:{{ ansible_env.PATH }}"

- name: Install python packages inlcuding FastAPI in venv
  become: true
  become_user: "{{ server_user }}"
  ansible.builtin.shell: |
    source /opt/key_server/.venv/bin/activate && uv pip install fastapi uvicorn[standard] python-dotenv prometheus-fastapi-instrumentator
  args:
    executable: /bin/bash
  environment:
    PATH: "/home/{{ server_user }}/.local/bin:{{ ansible_env.PATH }}"
  notify: Restart key-server service

- name: Set environment variable with dataset keys
  ansible.builtin.copy:
    dest: /opt/key_server/.env
    content: |
      DATASET_KEYS_JSON={{ vault_truenas_dataset_keys_json | to_json }}
    mode: "0600"
  notify: Restart key-server service

- name: Ensure .env is owned and readable by the FastAPI user
  ansible.builtin.file:
    path: /opt/key_server/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"

- name: Create systemd service file
  ansible.builtin.copy:
    dest: /etc/systemd/system/key-server.service
    content: |
      [Unit]
      Description=Key Server for TrueNAS
      After=network.target

      [Service]
      Type=simple
      User={{ server_user }}
      WorkingDirectory=/opt/key_server
      ExecStart=/opt/key_server/.venv/bin/uvicorn main:app --host 0.0.0.0 --port "{{ vault_key_server_port }}"
      Restart=always

      [Install]
      WantedBy=multi-user.target
    mode: '0644'

- name: Restart key-server service
  ansible.builtin.systemd:
    name: key-server
    state: restarted

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start key-server
  ansible.builtin.systemd:
    name: key-server
    enabled: true
    state: started
