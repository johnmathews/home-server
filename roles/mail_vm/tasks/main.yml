- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - qemu-guest-agent
    state: present
    update_cache: true

- name: Install Docker using official role
  ansible.builtin.import_role:
    name: geerlingguy.docker
  tags: [docker]

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  tags: [docker]

- name: Ensure Docker config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [docker]

- name: Configure Docker daemon min API version
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "min-api-version": "1.24"
      }
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker
  tags: [docker]

- name: Create Docker Compose directory
  ansible.builtin.file:
    path: /srv/apps
    state: directory
    owner: "{{ docker_user }}"
    group: docker
    mode: "0755"
  tags: [docker]
