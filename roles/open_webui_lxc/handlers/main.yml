---

- name: Restart all containers 
  ansible.builtin.command: docker compose restart
  args:
    chdir: "{{ docker_compose_dir }}"

- name: Restart container
  command: docker compose restart open-webui
  args:
    chdir: "{{ docker_compose_dir }}"

- name: Restart Alloy
  command: docker compose restart alloy
  args:
    chdir: "{{ docker_compose_dir }}"
