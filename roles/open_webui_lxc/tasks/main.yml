# roles/paperless_lxc/tasks/main.yml

---

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true

- name: Ensure system group exists with fixed GID
  ansible.builtin.group:
    name: "{{ app_name }}"
    gid: "{{ pgid }}"
    system: true
    state: present

- name: Ensure user exists with fixed UID/GID
  ansible.builtin.user:
    name: "{{ app_name }}"
    uid: "{{ puid }}"
    group: "{{ app_name }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Create base app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/open-webui/data
    - /srv/apps/alloy

- name: Ensure data directory ownership
  ansible.builtin.file:
    path: /srv/apps/open-webui/data
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0770'
  notify: Restart open-webui

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify:
    - Restart all containers
  tags: docker

- name: Upload alloy config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/apps/alloy/config.alloy
  become: true
  tags: alloy
  notify:
    - Restart alloy

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  tags: docker
  notify:
    - Restart all containers
