# roles/paperless_lxc/tasks/main.yml

---

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: yes

- name: Create directory for SMB credentials
  ansible.builtin.file:
    path: /etc/smb
    state: directory
    mode: '0750'
    owner: root
    group: root

- name: Create SMB credentials file
  ansible.builtin.copy:
    dest: /etc/smb/.smbcredentials
    owner: root
    group: root
    mode: '0600'
    content: |
      username={{ smb_username }}
      password={{ vault_smb_username_password }}

- name: Ensure {{ app_name }} system group exists with fixed GID
  ansible.builtin.group:
    name: {{ app_name }}
    gid: "{{ pgid }}"
    system: yes
    state: present

- name: Ensure user exists with fixed UID/GID
  ansible.builtin.user:
    name: paperless
    uid: "{{ puid }}"
    group: paperless
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
    state: present

- name: Remove legacy fstab lines for paperless share
  ansible.builtin.lineinfile:
    path: /etc/fstab
    state: absent
    regexp: '^//{{ smb_server | regex_escape }}/paperless[ \t]+/mnt/paperless[ \t]+cifs[ \t]+'
  tags: paperless_fstab

- name: Ensure fstab entry for paperless share is present
  ansible.posix.mount:
    path: /mnt/paperless
    src: "//{{ smb_server }}/paperless"
    fstype: cifs
    opts: "credentials=/etc/smb/.smbcredentials,uid={{ puid }},gid={{ pgid }},dir_mode=0770,file_mode=0660,iocharset=utf8,cache=strict,noserverino,rw,_netdev,noatime,vers=3.1.1"
    state: present
  tags: paperless_fstab

- name: Ensure mountpoints exists
  ansible.builtin.file:
    path: {{ item.target }}
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: 
    - {{ smb_shares }}

- name: Mount or remount paperless share
  ansible.posix.mount:
    path: "{{ item.target }} "
    src: "//{{ smb_server }}/{{ item.name }}"
    fstype: cifs
    opts: "credentials=/etc/smb/.smbcredentials,uid={{ puid }},gid={{ pgid }},dir_mode=0770,file_mode=0660,iocharset=utf8,cache=strict,noserverino,rw,_netdev,noatime,vers=3.1.1"
    state: mounted
  tags: paperless_fstab
  loop: 
    - {{ smb_shares }}

- name: Create base app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/open-webui/data

- name: Ensure data directory ownership
  ansible.builtin.file:
    path: /srv/apps/open-webui/data
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0770'
  notify: Restart all containers

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify:
    - Update containers
    - Restart all containers

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  notify:
    - Update containers
    - Restart all containers
