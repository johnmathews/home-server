postgres_port: 5432

# Node exporter
node_exporter_version: latest

# Cadvisor
cadvisor_version: latest

# Alloy
alloy_version: latest
loki_endpoint: "http://192.168.2.106:3100/loki/api/v1/push"
node_hostname: "n8n"
