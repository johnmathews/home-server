TZ: Europe/Amsterdam
proxmox_api_user: "api@pve"
docker_compose_dir: /srv/apps
n8n_user: n8n
n8n_group: n8n
puid: 1001
guid: 1001

# n8n specific
n8n_version: latest
n8n_port: 5678
n8n_protocol: http
n8n_host: "{{ inventory_hostname }}"
n8n_webhook_url: "http://{{ inventory_hostname }}:{{ n8n_port }}/"
