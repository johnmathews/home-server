# roles/n8n_lxc/tasks/main.yml

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true

- name: Check current runc version
  ansible.builtin.command: runc --version
  register: runc_version_check
  changed_when: false
  failed_when: false

- name: Ensure runc 1.2.6 is installed (workaround for runc 1.3.3 LXC bug)
  when: "'1.2.6' not in runc_version_check.stdout"
  block:
    - name: Create temporary directory for runc download
      ansible.builtin.tempfile:
        state: directory
        suffix: runc
      register: runc_temp_dir

    - name: Download runc 1.2.6 binary
      ansible.builtin.get_url:
        url: https://github.com/opencontainers/runc/releases/download/v1.2.6/runc.amd64
        dest: "{{ runc_temp_dir.path }}/runc.amd64"
        mode: '0755'

    - name: Stop Docker service before replacing runc
      ansible.builtin.systemd:
        name: docker
        state: stopped

    - name: Backup existing runc if not already backed up
      ansible.builtin.copy:
        src: /usr/bin/runc
        dest: /usr/bin/runc.backup
        remote_src: true
        mode: '0755'
        force: false

    - name: Replace runc with new version
      ansible.builtin.copy:
        src: "{{ runc_temp_dir.path }}/runc.amd64"
        dest: /usr/bin/runc
        remote_src: true
        mode: '0755'
        owner: root
        group: root

    - name: Start Docker service after replacing runc
      ansible.builtin.systemd:
        name: docker
        state: started

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ runc_temp_dir.path }}"
        state: absent

- name: Harden SSH daemon (disable password login, allow key-only root)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.key }}\\s"
    line: "{{ item.key }} {{ item.value }}"
    state: present
    create: false
    backrefs: false
  loop:
    - {key: "PermitRootLogin", value: "prohibit-password"}
    - {key: "PasswordAuthentication", value: "no"}
    - {key: "KbdInteractiveAuthentication", value: "no"}
  notify: restart sshd
  tags: [ssh, security]

- name: Lookup existing group by gid
  become: true
  ansible.builtin.command: getent group {{ guid }}
  register: gid_lookup
  changed_when: false
  failed_when: false

- name: Rename existing group to {{ n8n_group }} if gid is taken
  become: true
  ansible.builtin.command: >
    groupmod -n {{ n8n_group }} {{ gid_lookup.stdout.split(':')[0] }}
  when:
    - gid_lookup.rc == 0
    - gid_lookup.stdout != ""
    - gid_lookup.stdout.split(':')[0] != n8n_group

- name: Ensure n8n system group exists with correct gid
  become: true
  ansible.builtin.group:
    name: "{{ n8n_group }}"
    gid: "{{ guid }}"
    system: true
    state: present

- name: Lookup existing user by uid
  become: true
  ansible.builtin.command: getent passwd {{ puid }}
  register: uid_lookup
  changed_when: false
  failed_when: false

- name: Rename existing user to {{ n8n_user }} if uid is taken
  become: true
  ansible.builtin.command: >
    usermod -l {{ n8n_user }} {{ uid_lookup.stdout.split(':')[0] }}
  when:
    - uid_lookup.rc == 0
    - uid_lookup.stdout != ""
    - uid_lookup.stdout.split(':')[0] != n8n_user

- name: Ensure n8n system user exists
  become: true
  ansible.builtin.user:
    name: "{{ n8n_user }}"
    uid: "{{ puid }}"
    group: "{{ n8n_group }}"
    create_home: false
    shell: /usr/sbin/nologin
    system: true
    state: present

- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ docker_compose_dir }}"
    - "{{ docker_compose_dir }}/alloy"
    - /var/lib/node_exporter/textfile_collector

- name: Create n8n data directories with proper ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
    owner: "{{ puid }}"
    group: "{{ guid }}"
  loop:
    - "{{ docker_compose_dir }}/n8n_data"

- name: Create postgres data directory with proper ownership
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/postgres_data"
    state: directory
    mode: '0755'
    owner: "{{ puid }}"
    group: "{{ guid }}"

- name: Configure Docker daemon (disable TCP listener)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    content: |
      {
        "log-driver": "{{ docker_daemon_log_driver }}",
        "hosts": {{ docker_daemon_hosts | to_json }}
      }
  notify: restart docker
  tags: [docker, security]

- name: Deploy .env file from template
  ansible.builtin.template:
    src: templates/.env.j2
    dest: "{{ docker_compose_dir }}/.env"
    owner: root
    group: root
    mode: '0600'
  notify:
    - restart docker compose stack
  tags: [docker]

- name: Upload alloy config files
  ansible.builtin.copy:
    src: templates/config.alloy
    dest: "{{ docker_compose_dir }}/alloy/config.alloy"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  notify:
    - restart alloy
  tags: [docker, alloy]

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  notify:
    - restart docker compose stack
  tags: [docker, alloy]
