# TrueNAS share refresh script (workaround for share activation bug)
refresh_shares_enabled: true
refresh_shares_nfs_path: "tank/document-store"
refresh_shares_smb_path: "tank/time-machine-backups/johns-laptop"
refresh_shares_wait_seconds: 5
refresh_shares_log_file: "/mnt/swift/logs/refresh_shares.log"

truenas_api_url: "https://192.168.2.104/api/v2.0"

# Safe reboot script configuration
safe_reboot_enabled: true
safe_reboot_pushover_enabled: true # send Pushover notifications (keys stored in vault)
safe_reboot_log_file: "/mnt/swift/logs/safe_reboot.log"
safe_reboot_lock_file: "/var/run/safe_reboot.lock"
safe_reboot_max_retries: 4
safe_reboot_retry_sleep_seconds: 300 # 5 minutes
safe_reboot_io_sample_duration: 180 # 3 minutes - total I/O sampling period (6 samples)
safe_reboot_io_sample_interval: 30 # 30 seconds - interval between samples
safe_reboot_io_ops_threshold: 120 # operations/min - allow minimal background I/O below this (2 ops/sec average)
safe_reboot_log_max_size_mb: 10 # rotate log when it reaches 10MB
safe_reboot_log_keep_count: 5 # keep last 5 rotated logs
