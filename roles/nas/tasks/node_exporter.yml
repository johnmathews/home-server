# truenas_vm/tasks/node_exporter.yml

---

- name: Install node_exporter binary
  ansible.builtin.get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
    dest: /tmp/node_exporter.tar.gz
    mode: '0644'

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /opt/
    remote_src: yes
    creates: /opt/node_exporter-1.8.1.linux-amd64/node_exporter

- name: Symlink binary
  ansible.builtin.file:
    src: /opt/node_exporter-1.8.1.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    state: link
    force: yes

- name: Create systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=nobody
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=default.target
    mode: '0644'

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes

- name: Stop node_exporter service
  ansible.builtin.systemd:
    name: node_exporter
    state: stopped
    enabled: false
  ignore_errors: true

- name: Remove node_exporter systemd service file
  ansible.builtin.file:
    path: /etc/systemd/system/node_exporter.service
    state: absent

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Remove node_exporter binary symlink
  ansible.builtin.file:
    path: /usr/local/bin/node_exporter
    state: absent

- name: Remove extracted node_exporter directory
  ansible.builtin.file:
    path: /opt/node_exporter-1.8.1.linux-amd64
    state: absent

- name: Remove downloaded archive
  ansible.builtin.file:
    path: /tmp/node_exporter.tar.gz
    state: absent
