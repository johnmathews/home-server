- name: Set ISO directory path
  set_fact:
    iso_dir: "{{ playbook_dir }}/../iso-images"
  delegate_to: localhost
  become: false
  tags: provision

- name: Ensure ISO directory exists
  file:
    path: "{{ iso_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  tags: provision

- name: Find TrueNAS ISO file
  find:
    paths: "{{ iso_dir }}"
    patterns: "TrueNAS-SCALE-*.iso"
    use_regex: false
  register: found_isos
  delegate_to: localhost
  become: false
  tags: provision

- name: Fail if no ISO is found
  fail:
    msg: "No TrueNAS ISO found in {{ iso_dir }}. Please download it and place it there."
  when: found_isos.matched == 0
  delegate_to: localhost
  become: false
  tags: provision

- name: Sort ISOs by filename (descending)
  set_fact:
    latest_iso: "{{ (found_isos.files | sort(attribute='path') | reverse)[0] }}"
  delegate_to: localhost
  become: false
  tags: provision

- name: Ensure ISO directory exists on Proxmox
  file:
    path: /var/lib/vz/template/iso
    state: directory
    mode: '0755'
  delegate_to: pve
  become: true
  tags: provision

- name: Upload latest TrueNAS ISO to Proxmox using rsync
  ansible.posix.synchronize:
    src: "{{ latest_iso.path }}"
    dest: "/var/lib/vz/template/iso/"
    mode: push
  delegate_to: localhost
  become: false
  tags: provision

- name: Authenticate with Proxmox API
  uri:
    url: "https://{{ hostvars[inventory_hostname]['ansible_host'] }}:8006/api2/json/access/ticket"
    method: POST
    body_format: form-urlencoded
    body:
      username: "root@pam"
      password: "{{ vault_proxmox_password }}"
    validate_certs: false
  register: proxmox_auth
  delegate_to: localhost
  become: false
  tags: provision

- name: Ensure ISO directory exists on Proxmox
  file:
    path: /var/lib/vz/template/iso
    state: directory
    mode: '0755'
  delegate_to: "{{ inventory_hostname }}"
  tags: provision

- name: Check if TrueNAS VM (ID 200) already exists
  uri:
    url: "https://{{ hostvars[inventory_hostname]['ansible_host'] }}:8006/api2/json/nodes/{{ hostvars[inventory_hostname]['proxmox_node_name'] }}/qemu/200/status/current"
    method: GET
    validate_certs: false
    headers:
      Cookie: "PVEAuthCookie={{ proxmox_auth.json.data.ticket }}"
      CSRFPreventionToken: "{{ proxmox_auth.json.data.CSRFPreventionToken }}"
  register: truenas_status
  failed_when: truenas_status.status not in [200, 404, 500]
  delegate_to: localhost
  become: false
  tags: provision

- name: Set truenas_exists fact
  set_fact:
    truenas_exists: "{{ truenas_status.status == 200 }}"
  tags: provision

- name: Create TrueNAS VM (only if not present)
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars[inventory_hostname]['ansible_host'] }}"
    node: "{{ hostvars[inventory_hostname]['proxmox_node_name'] }}"
    name: "{{ vm_name }}"
    cores: "{{ cores }}"
    memory: "{{ memory }}"
    balloon: 0
    scsihw: virtio-scsi-pci
    boot: order=scsi0;ide2
    ide:
      ide2: "{{ iso_storage }}:iso/{{iso_filename}},media=cdrom"
    scsi:
      scsi0: "{{ disk_storage }}:{{ disk_size }}"
    net:
      net0: "virtio={{ mac_address }},bridge=vmbr0"
    ostype: l26
    onboot: true
    state: present
  when: not truenas_exists
  delegate_to: localhost
  become: false
  tags: provision

- name: Set boot order to disk only and remove ISO (if installed)
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars[inventory_hostname]['ansible_host'] }}"
    node: "{{ hostvars[inventory_hostname]['proxmox_node_name'] }}"
    vmid: 200
    boot: order=scsi0
    ide: {}
    state: present
  when: truenas_installed | default(false)
  delegate_to: localhost
  become: false
  tags: provision

- name: Set up script to unlock datasets using key server
  import_tasks: key_server.yml
  tags: key

- name: Set up script to spindown HDDs if idle
  import_tasks: spindown_hdds.yml
  tags: hdds

- name: Set up script to refresh NFS/SMB shares on boot
  import_tasks: refresh_shares.yml
  tags: refresh-shares

- name: Deploy alloy configuration
  import_tasks: alloy_configuration.yml
  tags: alloy-configuration
