# cloudflared_lxc/tasks/main.yml

---

- name: Ensure cloudflared config directory exists
  ansible.builtin.file:
    path: "{{ cloudflared_config_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  tags: cloudflared

- name: Template cloudflared tunnel config
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ cloudflared_config_dir }}/config.yml"
    owner: root
    group: root
    mode: '0600'
  notify: restart cloudflared
  tags: cloudflared

- name: Sync tunnel config to Cloudflare API
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel/{{ cloudflared_tunnel_id }}/configurations"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflared_api_token }}"
      Content-Type: application/json
    body_format: json
    body: "{{ lookup('template', 'tunnel_config_api.json.j2') }}"
    status_code: 200
  delegate_to: localhost
  become: false
  changed_when: false
  tags: cloudflared

- name: Ensure cloudflared service is enabled and running
  ansible.builtin.systemd:
    name: cloudflared
    enabled: true
    state: started
  tags: cloudflared
