# File: roles/cloudflared_lxc/tasks/main.yml

- name: Create unprivileged LXC container for cloudflared
  community.general.proxmox:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    vmid: 210
    hostname: cloudflared
    node: "{{ hostvars['pve']['proxmox_node_name'] }}"
    cores: 1
    memory: 512
    disk: 2
    ostemplate: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
    storage: local-lvm
    unprivileged: true
    netif: '{"net0":"name=eth0,bridge=vmbr0,ip=192.168.2.218/24,gw=192.168.2.1"}'
    features:
      - nesting=1
    state: present
  delegate_to: localhost

- name: Start the container
  community.general.proxmox:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    vmid: 210
    node: "{{ hostvars['pve']['proxmox_node_name'] }}"
    state: started
  delegate_to: localhost

