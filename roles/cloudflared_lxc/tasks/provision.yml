# roles/cloudflared_lxc/tasks/provision.yml
---

- name: Read public key from file
  set_fact:
    lxc_ssh_key: "{{ lookup('file', hostvars['cloudflared'].vm_config.ssh_key) }}"

- name: Write public key to a temporary file on Proxmox
  copy:
    content: "{{ lxc_ssh_key }}"
    dest: "/tmp/{{ hostvars['cloudflared'].vm_config.hostname }}_key.pub"
    mode: '0644'
  delegate_to: pve

- name: Ensure container template exists
  ansible.builtin.shell: |
    if ! pveam list {{ hostvars['cloudflared'].vm_config.template_storage }} | grep -q "{{ hostvars['cloudflared'].vm_config.ostemplate }}"; then
      pveam download {{ hostvars['cloudflared'].vm_config.template_storage }} {{ hostvars['cloudflared'].vm_config.ostemplate | regex_replace('^.*vztmpl/', '') }}
    fi
  args:
    executable: /bin/bash
  delegate_to: pve
  become: true

- name: Build LXC create command
  set_fact:
    lxc_create_cmd: >-
      pct create {{ hostvars['cloudflared'].vm_config.vmid }} {{ hostvars['cloudflared'].vm_config.ostemplate }}
      --hostname {{ hostvars['cloudflared'].vm_config.hostname }}
      --cores {{ hostvars['cloudflared'].vm_config.cores }}
      --memory {{ hostvars['cloudflared'].vm_config.memory }}
      --net0 name=eth0,bridge={{ hostvars['cloudflared'].vm_config.net_bridge }},ip={{ hostvars['cloudflared'].vm_config.ip_address }}/{{ hostvars['cloudflared'].vm_config.netmask }},gw={{ vm_defaults.gateway }},hwaddr={{ hostvars['cloudflared'].vm_config.mac }}
      --storage {{ hostvars['cloudflared'].vm_config.storage }}
      --unprivileged 1
      --rootfs {{ hostvars['cloudflared'].vm_config.storage }}:2
      --onboot 1
      --password changeme
      --ssh-public-keys /tmp/{{ hostvars['cloudflared'].vm_config.hostname }}_key.pub

- name: Check if LXC config file exists
  ansible.builtin.stat:
    path: "/etc/pve/nodes/proxmox/lxc/{{ hostvars['cloudflared'].vm_config.vmid }}.conf"
  register: lxc_conf
  delegate_to: pve

- name: Create LXC if it doesn't exist
  ansible.builtin.command: "{{ lxc_create_cmd }}"
  when: not lxc_conf.stat.exists
  delegate_to: pve
  become: true

- name: Get container status
  command: pct status {{ hostvars['cloudflared'].vm_config.vmid }}
  register: pct_status
  delegate_to: pve
  changed_when: false

- name: Start LXC container if not running
  command: pct start {{ hostvars['cloudflared'].vm_config.vmid }}
  when: "'status: stopped' in pct_status.stdout"
  delegate_to: pve
  become: true

- name: Wait for SSH to be available
  wait_for:
    host: "{{ hostvars['cloudflared'].vm_config.ip_address }}"
    port: 22
    timeout: 60

# this was a gotcha. vm_config.hostname was the same as a host in inventory.ini, which led to 
# host_vars/<host_name> being looked up and `ansible_host` being read automagically.
- name: Add cloudflared container to inventory - DYNAMIC HOST (inventory)
  add_host:
    name: "{{ hostvars['cloudflared'].vm_config.hostname }}"
    ansible_host: "{{ hostvars['cloudflared'].vm_config.ip_address }}"
    ansible_user: root
    groups: cloudflared

- name: Remove temporary SSH key file
  file:
    path: "/tmp/{{ hostvars['cloudflared'].vm_config.hostname }}_key.pub"
    state: absent
  delegate_to: pve
