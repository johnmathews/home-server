- name: Ensure SSH server is installed
  apt:
    name: openssh-server
    state: present
  become: true

- name: Ensure SSH server is enabled and started
  service:
    name: ssh
    enabled: true
    state: started
  become: true

- name: Push SSH key into LXC
  authorized_key:
    user: root
    key: "{{ lxc_ssh_key }}"
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Install cloudflared
  ansible.builtin.apt:
    deb: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
    state: present
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Create cloudflared config directory
  file:
    path: /etc/cloudflared
    state: directory
    mode: '0755'
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Deploy tunnel config
  template:
    src: config.yml.j2
    dest: /etc/cloudflared/config.yml
    mode: '0600'
  vars:
    vm_config: "{{ hostvars['cloudflared'].vm_config }}"
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Install systemd service for cloudflared
  template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    mode: '0644'
  notify: Restart cloudflared
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Reload systemd
  systemd:
    daemon_reload: true
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Enable and start cloudflared service
  systemd:
    name: cloudflared
    enabled: true
    state: started
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"

- name: Enable and start cloudflared service
  systemd:
    name: cloudflared
    enabled: true
    state: started
  delegate_to: "{{ hostvars['cloudflared'].vm_config.hostname }}"
