- name: Install cloudflared
  ansible.builtin.apt:
    deb: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
    state: present
  delegate_to: "{{ vm_config.name }}"
  tags: cloudflared_configure

- name: Create cloudflared config directory
  file:
    path: /etc/cloudflared
    state: directory
    mode: '0755'
  delegate_to: "{{ vm_config.name }}"
  tags: cloudflared_configure

- name: Deploy tunnel config
  template:
    src: config.yml.j2
    dest: /etc/cloudflared/config.yml
    mode: '0600'
  delegate_to: "{{ vm_config.name }}"
  tags: cloudflared_configure

- name: Install systemd service
  command: cloudflared service install
  args:
    creates: /etc/systemd/system/cloudflared.service
  delegate_to: "{{ vm_config.name }}"
  tags: cloudflared_configure

- name: Enable and start cloudflared service
  systemd:
    name: cloudflared
    enabled: true
    state: started
  delegate_to: "{{ vm_config.name }}"
  tags: cloudflared_configure
