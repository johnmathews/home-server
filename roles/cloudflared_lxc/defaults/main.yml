cloudflared_config_dir: /etc/cloudflared
cloudflared_tunnel_name: home-server
cloudflared_tunnel_id: e1e3b9c4-789a-4ad3-adff-a0c71bff1122
cloudflared_account_id: "{{ vault_cloudflared_account_id }}"
cloudflared_api_token: "{{ vault_cloudflared_api_token }}"

# Tunnel ingress rules — single source of truth for both config.yml and API sync.
# Each entry has: prefix (subdomain, or "" for bare domain), service (origin URL).
# Optional: no_tls_verify (bool), set_host_header (bool).
cloudflared_ingress:
  # if local network address is 192.168.2.108 and there is no port then it goes via traefik 
  # Public services (via Traefik — no Zero Access, rate-limited)
  - prefix: ""
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: docs
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: timer
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: uptime
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: speed
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: sre
    service: "http://192.168.2.108"
    set_host_header: true
  - prefix: stats
    service: "http://192.168.2.108"
    set_host_header: true

  # Relay on agent lxc 
  - prefix: relay
    service: "http://192.168.2.107:7800"

  # Documentation (direct — behind Zero Access)
  - prefix: docs-mcp
    service: "http://192.168.2.106:8085"
  - prefix: server-docs
    service: "http://192.168.2.106:8000"
  - prefix: agent-docs
    service: "http://192.168.2.107:8001"
