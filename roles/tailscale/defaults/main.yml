# Tailscale configuration defaults

tailscale_auth_key: "{{vault_tailscale_auth_key }}"

# Enable/disable Tailscale service
tailscale_enabled: true

# Tailscale arguments (--advertise-routes, --accept-routes, etc.)
tailscale_args: ""

# Accept routes from other Tailscale nodes
tailscale_accept_routes: false

# Advertise routes to other nodes (e.g., "192.168.2.0/24" for Proxmox to share local network)
tailscale_advertise_routes: ""

# Enable exit node functionality (route all traffic through this node)
tailscale_exit_node: false

# Accept DNS from Tailscale (MagicDNS)
# Default false: local DNS (e.g. AdGuard) should not be overridden by Tailscale.
# When true, Tailscale pushes MagicDNS (100.100.100.100) as a catch-all resolver
# via systemd-resolved, silently bypassing any local DNS configuration.
tailscale_accept_dns: false

# SSH server via Tailscale
tailscale_ssh: false

# Tags for ACL-based access control
tailscale_tags: ""
