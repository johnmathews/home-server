# roles/common/tasks/main.yml
---
- name: Upgrade all packages
  apt:
    upgrade: dist
    update_cache: yes

- name: Install useful packages
  apt:
    name:
      - vim
      - htop
      - curl
      - git
      - lsof
      - sudo
      - jq
    state: present

- name: Install python3 packages from apt
  apt:
    name:
      - python3-pip
      - python3-requests
      - python3-proxmoxer
    state: present
  become: true
