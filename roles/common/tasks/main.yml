# roles/common/tasks/main.yml
---
- name: Upgrade all packages
  apt:
    upgrade: dist
    update_cache: yes

- name: Install useful packages
  apt:
    name:
      - vim
      - htop
      - curl
      - git
      - lsof
      - sudo
      - jq
    state: present

- name: Ensure pip and required Python libs are installed on Proxmox
  apt:
    name:
      - python3-pip
    state: present
  become: true

- name: Install proxmoxer and requests
  pip:
    name:
      - proxmoxer
      - requests
  become: true
