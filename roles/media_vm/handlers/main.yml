# a hander is a deferred action. it runs once at the end of a play only if a task has
# triggered it using `notify`. if it is triggered multiple times it still only runs once.
# often used for restarting a service, or rebooting a machine.


- name: Restart media stack
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_base_dir }}"
    state: present # bring up/ensure running
    recreate: always # force-recreate changed services
    remove_orphans: true
  become: false

- name: Restart qbittorrent
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_base_dir }}"
    services:
      - qbittorrent
    state: present
    recreate: always
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart alloy
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_base_dir }}"
    services:
      - alloy
    state: present
    recreate: always
    dependencies: true
    remove_orphans: true
  become: false

- name: Restart gluetun
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_base_dir }}"
    services:
      - gluetun
      - qbittorrent
      - sabnzbd
      - slskd
    state: present
    recreate: always
    remove_orphans: true
  become: false

- name: Restart sleep-hours timers
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  loop:
    - docker-sleep@pause.timer
    - docker-sleep@unpause.timer
