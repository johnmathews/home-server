- name: Install uptimekumactl script
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/uptimekumactl.py
    dest: /usr/local/bin/kumactl.py
    owner: root
    group: root
    mode: '0755'

# Make the script use the venv interpreter explicitly
