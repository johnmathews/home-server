# roles/media_vm/tasks/sleep_docker_containes.yml

- name: Ensure quiet-hours directory exists
  become: true
  file:
    path: /etc/sleep-hours
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install docker-sleep script
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/docker-sleep.sh
    dest: /usr/local/bin/docker-sleep.sh
    owner: root
    group: root
    mode: '0755'
  notify: restart sleep-hours timers

- name: Install systemd service (templated @ service)
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@.service
    dest: /etc/systemd/system/docker-sleep@.service
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install pause timer
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@pause.timer.j2
    dest: /etc/systemd/system/docker-sleep@pause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install unpause timer
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@unpause.timer.j2
    dest: /etc/systemd/system/docker-sleep@unpause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install containers list
  become: true
  template:
    src: templates/sleep_containers/containers.list
    dest: /etc/sleep-hours/containers.list
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install Uptime Kuma container→monitor map
  become: true
  template:
    src: templates/sleep_containers/kuma.map
    dest: /etc/sleep-hours/kuma.map
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Enable and start timers
  become: true
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - docker-sleep@pause.timer
    - docker-sleep@unpause.timer

- name: Ensure directory for kumactl venv exists
  become: true
  file:
    path: /opt/uptimekumactl
    state: directory
    owner: root
    group: root
    mode: '0755'

# --- prerequisites (APT) ---
- name: Install Python venv/pip prerequisites
  become: true
  apt:
    name:
      - python3-venv          # generic provider of ensurepip for python3
      - python3.12-venv       # explicit provider for 3.12 (present on Noble)
      - python3-pip           # handy for bootstrap tasks
    state: present
    update_cache: yes
    cache_valid_time: 3600

# --- venv creation ---
- name: Create Python venv for kumactl (prefer 3.12 if present)
  become: true
  block:
    - name: Check for python3.12
      command: bash -lc 'command -v python3.12 || true'
      register: py312_path
      changed_when: false

    - name: Create venv with python3.12
      command: "{{ py312_path.stdout }} -m venv /opt/uptimekumactl/venv"
      args:
        creates: /opt/uptimekumactl/venv/bin/activate
      when: py312_path.stdout | length > 0

    - name: Create venv with default python3
      command: python3 -m venv /opt/uptimekumactl/venv
      args:
        creates: /opt/uptimekumactl/venv/bin/activate
      when: py312_path.stdout | length == 0

# (Optional) sanity check: ensure ensurepip worked inside the venv
- name: Verify venv has working pip
  become: true
  command: /opt/uptimekumactl/venv/bin/python -m pip --version
  changed_when: false

# --- pip in venv ---
- name: Upgrade pip in venv
  become: true
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: /opt/uptimekumactl/venv

- name: Install uptime-kuma-api in venv (pinned)
  become: true
  ansible.builtin.pip:
    name: "uptime-kuma-api>=1.2,<1.3"
    virtualenv: /opt/uptimekumactl/venv

# Put your script in the role at: roles/media_vm/files/sleep_containers/uptimekumactl.py
- name: Install uptimekumactl CLI
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/uptimekumactl.py
    dest: /usr/local/bin/kumactl.py
    owner: root
    group: root
    mode: '0755'

- name: Rewrite shebang to use venv python
  become: true
  ansible.builtin.lineinfile:
    path: /usr/local/bin/kumactl.py
    regexp: '^#!.*python'
    line: '#!/opt/uptimekumactl/venv/bin/python3'

