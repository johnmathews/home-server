# roles/media_vm/tasks/sleep_docker_containes.yml

- name: Ensure quiet-hours directory exists
  become: true
  file:
    path: /etc/quiet-hours
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install docker-quiet script
  become: true
  template:
    src: templates/docker-quiet.sh.j2
    dest: /usr/local/bin/docker-quiet.sh
    owner: root
    group: root
    mode: '0755'
  notify: restart quiet-hours timers

- name: Install systemd service (templated @ service)
  become: true
  template:
    src: templates/docker-quiet@.service.j2
    dest: /etc/systemd/system/docker-quiet@.service
    owner: root
    group: root
    mode: '0644'
  notify: restart quiet-hours timers

- name: Install pause timer
  become: true
  template:
    src: templates/docker-quiet@pause.timer.j2
    dest: /etc/systemd/system/docker-quiet@pause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart quiet-hours timers

- name: Install unpause timer
  become: true
  template:
    src: templates/docker-quiet@unpause.timer.j2
    dest: /etc/systemd/system/docker-quiet@unpause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart quiet-hours timers

- name: Install containers list
  become: true
  template:
    src: templates/containers.list.j2
    dest: /etc/quiet-hours/containers.list
    owner: root
    group: root
    mode: '0644'
  notify: restart quiet-hours timers

- name: Enable and start timers
  become: true
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - docker-quiet@pause.timer
    - docker-quiet@unpause.timer
