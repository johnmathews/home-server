# roles/media_vm/tasks/sleep_docker_containes.yml

- name: Ensure quiet-hours directory exists
  become: true
  file:
    path: /etc/sleep-hours
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install docker-sleep script
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/docker-sleep.sh
    dest: /usr/local/bin/docker-sleep.sh
    owner: root
    group: root
    mode: '0755'
  notify: restart sleep-hours timers

- name: Install systemd service (templated @ service)
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@.service
    dest: /etc/systemd/system/docker-sleep@.service
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install pause timer
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@pause.timer.j2
    dest: /etc/systemd/system/docker-sleep@pause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install unpause timer
  become: true
  template:
    src: templates/sleep_containers/docker-sleep@unpause.timer.j2
    dest: /etc/systemd/system/docker-sleep@unpause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Install containers list
  become: true
  template:
    src: templates/sleep_containers/containers.list
    dest: /etc/sleep-hours/containers.list
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers

- name: Enable and start timers
  become: true
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - docker-sleep@pause.timer
    - docker-sleep@unpause.timer
