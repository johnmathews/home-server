# File: roles/media_vm/tasks/main.yml

---

- name: Gather facts for media-vm
  ansible.builtin.setup: {}

- name: Ensure broken package state is fixed
  ansible.builtin.command: apt --fix-broken install -y
  changed_when: false  # Optional: suppresses 'changed' output unless something is actually fixed

- name: Perform dist upgrade
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    cache_valid_time: 3600

- name: Install SMB client and mount utilities
  ansible.builtin.apt:
    name:
      - cifs-utils    # needed for mounting SMB shares via fstab or manually
      - smbclient     # optional, for testing shares via CLI
      - qemu-guest-agent
    state: present
    update_cache: true

- name: Install Docker using official role
  import_role:
    name: geerlingguy.docker
  tags: docker

- name: Add user to docker group
  user:
    name: john
    groups: docker
    append: yes
  become: true
  tags: docker

- import_tasks: mount-smb.yml
  tags: [mount, smb]

- name: Create media stack base directory
  file:
    path: "{{ media_stack_base_dir | dirname }}"
    state: directory
    mode: '0755'

# 6. Apply base directory ownership early
- name: Ensure required directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    recurse: true
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_group }}"
    mode: '0755'
  loop:
    - "{{ media_stack_base_dir }}"
    - "{{ media_stack_mount_dir }}/library"
    - "{{ media_stack_mount_dir }}/media"

- name:  Ensure hometube config directory exists
  file:
    path: "{{ media_stack_base_dir }}/config/hometube/cookies"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: hometube

- name:  Ensure alloy config directory exists
  file:
    path: "{{ media_stack_base_dir }}/config/alloy"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: alloy

- name:  Ensure gluetun config directory exists
  file:
    path: "{{ media_stack_base_dir }}/config/gluetun/auth"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: gluetun

# 7. Handle qBittorrent config prep before container starts
- name: Re-create qbittorrent config directory
  file:
    path: "{{ media_stack_base_dir }}/config/qBittorrent"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  when: reset_qbittorrent_config | default(false)
  tags: qbittorrent

- name: Pre-seed qBittorrent.conf if missing and not resetting
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ media_stack_base_dir }}/config/qBittorrent/qBittorrent.conf"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
    force: false  # Do not overwrite if already exists
  when: reset_qbittorrent_config | default(false)
  tags: qbittorrent

# 9. Copy docker compose files
- name: Copy docker-compose.yml
  template:
    src: templates/docker-compose.yml.j2
    dest: /srv/media/docker-compose.yml
    mode: '0644'
  notify: 
    - restart media stack
  tags: docker

- name: Upload alloy config file
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/media/config/alloy/config.alloy 
  become: true
  tags: [alloy] 
  notify: restart alloy

- name: Create environment file from template
  template:
    src: .env.j2
    dest: /srv/media/.env
    mode: '0600'
  notify: restart media stack
  tags: docker

- name: Create gluetun config file from template
  template:
    src: templates/gluetun/gluetun_config.toml.j2
    dest: /srv/media/config/gluetun/config.toml
    mode: '0600'
  notify: restart gluetun
  tags: gluetun

- name: Create gluetun auth file from template
  template:
    src: templates/gluetun/gluetun_auth.toml.j2
    dest: /srv/media/config/gluetun/auth/config.toml
    mode: '0600'
  notify: restart gluetun
  tags: gluetun

- name: Ensure .env and docker-compose.yml are owned by "john"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
  loop:
    - /srv/media/.env
  tags: docker

- name: Ensure Radarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/radarr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'

- name: Ensure Sonarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/sonarr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'

- name: Check if docker-compose.yml exists
  stat:
    path: /srv/media/docker-compose.yml
  register: compose_file
  tags: docker

- name: Fail if docker-compose.yml is missing
  fail:
    msg: "docker-compose.yml not found in /srv/media"
  when: not compose_file.stat.exists
  tags: docker

- name: Set permissions of file browser config directory
  ansible.builtin.command: chown -R 1000:1000 "{{ media_stack_base_dir }}/config/filebrowser"
  become: true

# 11. Start Docker stack (only after config + paths are ready)
- name: Start media stack containers
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_base_dir }}"
    state: present
    recreate: always
    remove_orphans: true
  become: false
  tags: docker

- import_tasks: sleep_docker_containers.yml
  tags: sleep
