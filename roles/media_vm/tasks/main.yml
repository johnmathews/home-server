# roles/media_vm/tasks/main.yml
---

- name: Import raw disk into Proxmox VM
  community.general.proxmox_disk:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    vmid: "{{ cloud_image_vmid }}"
    disk: scsi0
    import_from: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    storage: "{{ cloud_image_storage }}"
    format: raw
    state: present
  delegate_to: pve
  become: true

- name: Check for imported disk on Proxmox
  ansible.builtin.shell: ls -lh /var/lib/pve/images/{{ cloud_image_vmid }}
  register: disk_contents
  delegate_to: pve
  become: true

- debug:
    var: disk_contents.stdout_lines

- name: Finalize and start VM
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ proxmox_api_host }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ cloud_image_vmid }}"
    name: media
    memory: 8192
    cores: 4
    ostype: l26
    scsihw: virtio-scsi-pci
    onboot: true

    # Attach imported disk
    scsi:
      scsi0: "{{ cloud_image_storage }}:vm-{{ cloud_image_vmid }}-disk-0"
    boot: order=scsi0
    bootdisk: scsi0

    # Cloud-init settings
    ide:
      ide2: local:cloudinit
    ipconfig:
      ipconfig0: "{{ mediaVM.ipconfig0 }}"
    net:
      net0: "virtio={{ mediaVM.mac }},bridge={{ mediaVM.net_bridge }}"
    citype: nocloud
    ciuser: "{{ mediaVM.ciuser }}"
    cipassword: '{{ vault_ubuntu_media_password }}'
    sshkeys: '{{ sshkeys }}'

    state: started
  delegate_to: localhost
