# File: roles/media_vm/tasks/main.yml

---


# 1. Playbook safety and environment setup
- name: Ensure play runs only on the media VM
  ansible.builtin.assert:
    that:
      - inventory_hostname == "media-vm"
      - ansible_hostname == "media"
      - ansible_host == "192.168.2.105"
    fail_msg: >
      This playbook must run on media (192.168.2.105). Got: inventory_hostname={{ inventory_hostname }}, ansible_host={{ ansible_host }}

- name: Gather facts for media-vm
  ansible.builtin.setup: {}


# 2. OS package updates
- name: Ensure broken package state is fixed
  ansible.builtin.command: apt --fix-broken install -y
  changed_when: false  # Optional: suppresses 'changed' output unless something is actually fixed

- name: Perform dist upgrade
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    cache_valid_time: 3600

# 3. Install required packages
- name: Install SMB client and mount utilities
  ansible.builtin.apt:
    name:
      - cifs-utils    # needed for mounting SMB shares via fstab or manually
      - smbclient     # optional, for testing shares via CLI
    state: present
    update_cache: true

- name: Install Docker using official role
  import_role:
    name: geerlingguy.docker

- name: Add user to docker group
  user:
    name: john
    groups: docker
    append: yes
  become: true

# 4. Create necessary directories
- import_tasks: mount-smb.yml
  tags: [mount, smb]

- name: Create media stack base directory
  file:
    path: "{{ media_stack_config_dir | dirname }}"
    state: directory
    mode: '0755'

# 6. Apply base directory ownership early
- name: Ensure required directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    recurse: true
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_group }}"
    mode: '0755'
  loop:
    - "{{ media_stack_config_dir }}"
    - "{{ media_stack_mount_dir }}/library/family"
    - "{{ media_stack_mount_dir }}/library/kids"
    - "{{ media_stack_config_dir | dirname }}"
  when: item != "/mnt/media/library/downloads/incomplete"

- name: Set ownership of config and mount dirs
  file:
    path: "{{ item }}"
    recurse: true
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_group }}"
  loop:
    - /srv/media/config
    - /mnt/media/library/family
    - /mnt/media/library/kids
  when: item != "/mnt/media/library/downloads/incomplete"

# 7. Handle qBittorrent config prep before container starts
- name: Re-create qbittorrent config directory
  file:
    path: "{{ media_stack_config_dir }}/qBittorrent"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  when: reset_qbittorrent_config | default(false)

- name: Pre-seed qBittorrent.conf if missing and not resetting
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ media_stack_config_dir }}/qBittorrent/qBittorrent.conf"
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0644'
    force: false  # Do not overwrite if already exists
  when: reset_qbittorrent_config | default(false)

# 9. Copy environment and compose files
- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /srv/media/docker-compose.yml
    mode: '0644'
  notify: Restart media stack

- name: Create environment file from template
  template:
    src: .env.j2
    dest: /srv/media/.env
    mode: '0600'
  notify: Restart media stack

- name: Create gluetun config file from template
  template:
    src: gluetun_config.toml.j2
    dest: "{{ media_stack_config_dir }}/gluetun/config.toml"
    mode: '0600'
  notify: Restart media stack

- name: Ensure .env and docker-compose.yml are owned by "john"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
  loop:
    - /srv/media/.env

- name: Ensure Radarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/radarr"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'

- name: Ensure Sonarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/sonarr"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'

- name: Ensure Jackett config directory exists
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/jackett"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'
- name: Check if docker-compose.yml exists
  stat:
    path: /srv/media/docker-compose.yml
  register: compose_file

- name: Fail if docker-compose.yml is missing
  fail:
    msg: "docker-compose.yml not found in /srv/media"
  when: not compose_file.stat.exists

- name: Ensure mounted media directories exist
  stat:
    path: "{{ item }}"
  loop:
    - "{{ media_stack_mount_dir }}/library"
  register: mounted_dirs

- name: Fail if any mounted media paths are missing
  fail:
    msg: "Missing required SMB mount: {{ item.item }}"
  when: not item.stat.exists
  loop: "{{ mounted_dirs.results }}"

# 11. Start Docker stack (only after config + paths are ready)
- name: Start media stack containers
  community.docker.docker_compose_v2:
    project_src: /srv/media
    state: present
    recreate: auto
  become: false
