# File: roles/media_vm/tasks/main.yml

---


# 1. Playbook safety and environment setup
- name: Ensure play runs only on the media VM
  ansible.builtin.assert:
    that:
      - inventory_hostname == "media-vm"
      - ansible_hostname == "media"
      - ansible_host == "192.168.2.105"
    fail_msg: >
      This playbook must run on media (192.168.2.105). Got: inventory_hostname={{ inventory_hostname }}, ansible_host={{ ansible_host }}

- name: Gather facts for media-vm
  ansible.builtin.setup: {}


# 2. OS package updates
- name: Ensure broken package state is fixed
  ansible.builtin.command: apt --fix-broken install -y
  changed_when: false  # Optional: suppresses 'changed' output unless something is actually fixed

- name: Perform dist upgrade
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

# 3. Install required packages
- name: Install SMB client and mount utilities
  ansible.builtin.apt:
    name:
      - cifs-utils    # needed for mounting SMB shares via fstab or manually
      - smbclient     # optional, for testing shares via CLI
    state: present
    update_cache: true

- name: Install Docker using official role
  import_role:
    name: geerlingguy.docker

- name: Add user to docker group
  user:
    name: john
    groups: docker
    append: yes
  become: true

# 4. Create necessary directories
- import_tasks: mount-smb.yml
  tags: [mount, smb]

- name: Create media stack base directory
  file:
    path: "{{ media_stack_config_dir | dirname }}"
    state: directory
    mode: '0755'

# 6. Apply base directory ownership early
- name: Ensure required media directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ media_stack_config_dir }}"
    - "{{ media_stack_mount_dir }}/downloads"
    - "{{ media_stack_mount_dir }}/library"

- name: Set ownership of all media paths to john
  ansible.builtin.file:
    path: "{{ item }}"
    recurse: true
    owner: john
    group: john
  loop:
    - "{{ media_stack_config_dir | dirname }}"
    - "{{ media_stack_config_dir }}"
    - "{{ media_stack_mount_dir }}/downloads"
    - "{{ media_stack_mount_dir }}/library"

# 7. Handle qBittorrent config prep **before container starts**
- name: Remove broken qbittorrent config directory (if needed)
  file:
    path: "{{ media_stack_config_dir }}/qbittorrent"
    state: absent
  when: reset_qbittorrent_config | default(false)

- name: Re-create qbittorrent config directory
  file:
    path: "{{ media_stack_config_dir }}/qbittorrent"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'

# 8. Fix permissions specifically for UID 3002 (container user)
- name: Ensure qbittorrent config path has correct ownership
  ansible.builtin.file:
    path: /srv/media/config/qbittorrent
    state: directory
    recurse: yes
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: "0755"

# 9. Copy environment and compose files
- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /srv/media/docker-compose.yml
    mode: '0644'
  notify: Restart media stack

- name: Create environment file from template
  template:
    src: .env.j2
    dest: /srv/media/.env
    mode: '0600'
  notify: Restart media stack

- name: Ensure .env and docker-compose.yml are owned by "john"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: john
    group: john
  loop:
    - /srv/media/.env
    - /srv/media/docker-compose.yml

- name: Pre-seed qBittorrent.conf if missing and not resetting
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ media_stack_config_dir }}/qbittorrent/qBittorrent.conf"
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0644'
    force: false  # Do not overwrite if already exists
  when: not reset_qbittorrent_config | default(false)

- name: Ensure Radarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/radarr"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'

- name: Ensure Sonarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/sonarr"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'

- name: Ensure Jackett config directory exists
  ansible.builtin.file:
    path: "{{ media_stack_config_dir }}/jackett"
    state: directory
    recurse: true
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
    mode: '0755'

- name: Test write to Jackett config path
  command: docker exec jackett touch /config/ansible-test-write
  register: jackett_config_test
  failed_when: jackett_config_test.rc != 0
  changed_when: false

- name: Check if docker-compose.yml exists
  stat:
    path: /srv/media/docker-compose.yml
  register: compose_file

- name: Fail if docker-compose.yml is missing
  fail:
    msg: "docker-compose.yml not found in /srv/media"
  when: not compose_file.stat.exists

- name: Ensure mounted media directories exist
  stat:
    path: "{{ item }}"
  loop:
    - "{{ media_stack_mount_dir }}/downloads"
    - "{{ media_stack_mount_dir }}/library/tv"
    - "{{ media_stack_mount_dir }}/library/movies"
  register: mounted_dirs

- name: Fail if any mounted media paths are missing
  fail:
    msg: "Missing required SMB mount: {{ item.stat.path }}"
  when: not item.stat.exists
  loop: "{{ mounted_dirs.results }}"

# 11. Start Docker stack (only after config + paths are ready)
- name: Start media stack containers
  community.docker.docker_compose_v2:
    project_src: /srv/media
    state: present
    recreate: auto
  become: false

# 12. Health checks
- name: Test write access for download path
  ansible.builtin.command: test -w /srv/media/downloads
  register: download_write_test
  failed_when: download_write_test.rc != 0
  changed_when: false

- name: Test file write inside qbittorrent container
  ansible.builtin.command: docker exec qbittorrent touch /downloads/ansible-test-write
  register: qbittorrent_write_test
  failed_when: qbittorrent_write_test.rc != 0
  changed_when: false

- name: Check if qBittorrent config file exists inside container
  command: docker exec qbittorrent test -f /config/qBittorrent/qBittorrent.conf
  register: qbittorrent_config_exists
  ignore_errors: true
  changed_when: false

- name: Sanity check qbittorrent WebUI config inside container
  command: docker exec qbittorrent grep -q "^WebUI\\\\Username={{ media_stack_users.qbittorrent.username }}" /config/qBittorrent/qBittorrent.conf
  register: qb_sanity_check
  failed_when: qb_sanity_check.rc != 0 and qb_sanity_check.rc != 1
  changed_when: false
  when:
    - not reset_qbittorrent_config
    - qbittorrent_config_exists.rc == 0

- name: Debug qBittorrent config file presence
  debug:
    msg: "qBittorrent config present? {{ qbittorrent_config_exists.stat.exists | default(false) }}"


- name: Test write to Sonarr config path
  command: docker exec sonarr touch /config/ansible-test-write
  register: sonarr_config_test
  failed_when: sonarr_config_test.rc != 0
  changed_when: false

- name: Confirm Sonarr is running
  shell: >
    {% raw %}docker ps --filter name=sonarr --filter status=running --format '{{.Names}}'{% endraw %}
  register: sonarr_running
  failed_when: "'sonarr' not in sonarr_running.stdout"
  changed_when: false




- name: Test write to Radarr config path
  command: docker exec radarr touch /config/ansible-test-write
  register: radarr_config_test
  failed_when: radarr_config_test.rc != 0
  changed_when: false

- name: Confirm Radarr is running
  shell: >
    {% raw %}docker ps --filter name=radarr --filter status=running --format '{{.Names}}'{% endraw %}
  register: radarr_running
  failed_when: "'radarr' not in radarr_running.stdout"
  changed_when: false

- name: Check shared volume mounts in media containers
  shell: |
    docker exec {{ item }} test -w /downloads && echo "/downloads: OK" || echo "/downloads: MISSING or not writable"
    docker exec {{ item }} test -w /media && echo "/media: OK" || echo "/media: MISSING or not writable"
  with_items:
    - radarr
    - sonarr
    - qbittorrent
    - jackett
    - bazarr
    - filebrowser
  register: mount_check_results

- name: Show mount check results
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ mount_check_results.results }}"




# 13. Debug and status reporting
- name: List running Docker containers
  shell: docker ps
  register: docker_ps_output
  become: true

- name: Show container list
  debug:
    var: docker_ps_output.stdout_lines

- name: Show connection details
  debug:
    msg: |
      Configuration complete!
      ----------------------------------
      Host: {{ ansible_host }}
      User: {{ ansible_user }}
      Docker group user: {{ ciuser | default('Not defined') }}
