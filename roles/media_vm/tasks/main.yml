# roles/media_vm/tasks/main.yml
---
- name: Create Media VM
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: '{{ vault_proxmox_password }}'
    api_host: "{{ hostvars[inventory_hostname]['ansible_host'] }}"
    node: "{{ hostvars[inventory_hostname]['proxmox_node_name'] }}"
    vmid: 201
    name: media
    cores: 4
    memory: 8192
    scsihw: virtio-scsi-pci
    # Attach cloud-init drive automatically created by Proxmox
    ide:
      ide2: local:cloudinit
    # Main boot disk (created outside this task)
    scsi:
      scsi0: local-lvm:vm-201-disk-0,size=32G
    boot: order=scsi0
    bootdisk: scsi0
    net:
      net0: virtio,bridge=vmbr0
    ostype: l26
    onboot: true

    # Cloud-init configuration
    citype: nocloud
    ciuser: ubuntu
    cipassword: '{{ vault_ubuntu_media_password }}'
    sshkeys: '{{ sshkeys }}'

    state: present
    # timeout: 300   # Wait up to 5 minutes (default is 30s)
  delegate_to: localhost
  become: false 
