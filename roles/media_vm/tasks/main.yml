# File: roles/media_vm/tasks/main.yml
# for nfs tasks, see playbooks/media_vm.yml tag=nfs
# for share_drive_probe tasks, see playbooks/media_vm.yml tag=share
# for quiet_hours and pausing docker containers at night, see roles/sleep_hours role with tags=sleep

- name: Preserve SSH host keys across reboots
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99_preserve_ssh_keys.cfg
    content: |
      ssh_deletekeys: false
      ssh_genkeytypes: []
    mode: '0644'

- name: Gather facts for media-vm
  ansible.builtin.setup: {}

- name: Ensure broken package state is fixed
  ansible.builtin.command: apt --fix-broken install -y
  changed_when: false # Optional: suppresses 'changed' output unless something is actually fixed

- name: Perform dist upgrade
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    cache_valid_time: 3600

- name: Install SMB client and mount utilities
  ansible.builtin.apt:
    name:
      - cifs-utils # needed for mounting SMB shares via fstab or manually
      - smbclient # optional, for testing shares via CLI
      - qemu-guest-agent
    state: present
    update_cache: true

- name: Install deno for yt-dlp JavaScript runtime
  ansible.builtin.shell: |
    curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
  args:
    creates: /usr/local/bin/deno
  tags: deno

- name: Install Docker using official role
  ansible.builtin.import_role:
    name: geerlingguy.docker
  tags: docker

- name: Add user to docker group
  ansible.builtin.user:
    name: john
    groups: docker
    append: true
  become: true
  tags: docker

- name: Create media stack base directory
  ansible.builtin.file:
    path: "{{ media_stack_base_dir | dirname }}"
    state: directory
    mode: '0755'

- name: Ensure required directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    recurse: true
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_group }}"
    mode: '0755'
  loop:
    - "{{ media_stack_base_dir }}"
    - "{{ media_stack_mount_dir }}/library"
    - "{{ media_stack_mount_dir }}/media"

- name: Ensure journal-server data directory exists
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/journal/data"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: journal

- name: Ensure journal-server chromadb directory exists
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/journal/chromadb"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: journal

- name: Ensure journal-server context directory exists
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/journal/context"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: journal

- name: Upload journal-server context files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - people:
      src: templates/context/people.md
      dest: /srv/media/config/journal/context/people.md
    - places:
      src: templates/context/places.md
      dest: /srv/media/config/journal/context/places.md
  become: true
  tags: journal

- name: Ensure alloy config directory exists
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/alloy"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: alloy

- name: Ensure gluetun config directory exists
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/gluetun/auth"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  tags: gluetun

- name: Re-create qbittorrent config directory
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/qBittorrent"
    state: directory
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
    mode: '0755'
  when: reset_qbittorrent_config | default(false)
  tags: qbittorrent

- name: Pre-seed qBittorrent.conf if missing and not resetting
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ media_stack_base_dir }}/config/qBittorrent/qBittorrent.conf"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
    force: false # Do not overwrite if already exists
  when: reset_qbittorrent_config | default(false)
  tags: qbittorrent

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: /srv/media/docker-compose.yml
    mode: '0644'
  notify:
    - Restart media stack
  tags: docker, portainer

- name: Upload alloy config file
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/media/config/alloy/config.alloy
  become: true
  tags: [alloy]
  notify: Restart alloy

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: /srv/media/.env
    mode: '0600'
  notify: Restart media stack
  tags: docker, portainer

- name: Create gluetun config file from template
  ansible.builtin.template:
    src: templates/gluetun/gluetun_config.toml.j2
    dest: /srv/media/config/gluetun/config.toml
    mode: '0600'
  notify: Restart gluetun
  tags: gluetun

- name: Create gluetun auth file from template
  ansible.builtin.template:
    src: templates/gluetun/gluetun_auth.toml.j2
    dest: /srv/media/config/gluetun/auth/config.toml
    mode: '0600'
  notify: Restart gluetun
  tags: gluetun

- name: Ensure .env and docker-compose.yml are owned by "john"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ media_stack_user }}"
    group: "{{ media_stack_user }}"
  loop:
    - /srv/media/.env
  notify: Restart media stack
  tags: docker

- name: Ensure Radarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/radarr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  tags: radarr,docker

- name: Ensure Sonarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/sonarr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  tags: sonarr,docker

- name: Ensure Lidarr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/lidarr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  tags: lidarr,docker

- name: Ensure slskd config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/slskd"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  tags: slskd,docker

- name: Deploy slskd config from template
  ansible.builtin.template:
    src: templates/slskd/slskd.yml.j2
    dest: "{{ media_stack_base_dir }}/config/slskd/slskd.yml"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0600'
  notify: Restart media stack
  tags: slskd, docker

- name: Ensure Soularr config directory has correct UID/GID
  ansible.builtin.file:
    path: "{{ media_stack_base_dir }}/config/soularr"
    state: directory
    recurse: true
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0755'
  tags: soularr, docker

- name: Deploy Soularr config template
  ansible.builtin.template:
    src: templates/soularr/config.ini.j2
    dest: "{{ media_stack_base_dir }}/config/soularr/config.ini"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0600'
  notify: Restart media stack
  tags: soularr, docker

- name: Set permissions of file browser config directory
  ansible.builtin.command: chown -R 1001:1001 "{{ media_stack_base_dir }}/config/filebrowser"
  become: true

- name: Set permissions of booklore config directory
  ansible.builtin.command: chown -R 1001:1001 "{{ media_stack_base_dir }}/config/booklore"
  become: true

- name: Set Immich environment variables
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  become: true
  loop:
    - {key: IMMICH_API_KEY, value: "{{ vault_immich_media_vm_api_key }}"}
    - {key: IMMICH_LIBRARY_ID, value: "{{ vault_immich_reference_library_id }}"}
    - {key: IMMICH_API_URL, value: "{{ vault_immich_api_url }}"}
    - {key: IMMICH_SHARE_USER, value: "John"}
    - {key: PUSHOVER_USER_KEY, value: "{{ vault_pushover_user_key }}"}
    - {key: PUSHOVER_APP_TOKEN, value: "{{ vault_pushover_media_vm_app_api_token }}"}
  tags: immich, pushover
