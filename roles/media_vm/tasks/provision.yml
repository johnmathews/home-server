# roles/media_vm/tasks/provision.yml
---

- name: Set proxmox API facts explicitly
  set_fact:
    proxmox_api_host: "{{ ansible_host }}"
    proxmox_node: "{{ proxmox_node_name }}"

- name: Check if VM exists
  community.general.proxmox_vm_info:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    node: "{{ proxmox_node_name }}"
  register: vm_info
  delegate_to: localhost  # ← was: pve
  become: false

- name: Debug - evaluate 'vm_name' var is defined but VM hasn't been made yet.
  debug:
    msg: >-
      {{ 
        vm_name is defined and
         vm_info.proxmox_vms is defined and
         vm_name not in (
           vm_info.proxmox_vms | selectattr('name', 'defined') | map(attribute='name') | list
         )
      }} 
  delegate_to: localhost

- name: Create VM shell if it does not exist
  community.general.proxmox_kvm:
    api_host: "{{ ansible_host }}"
    api_user: "{{ ansible_api_user }}"
    api_password: "{{ vault_proxmox_password }}"
    node: "{{ proxmox_node_name }}"
    name: "{{ vm_name }}"
    memory: "{{ memory }}"
    cores: "{{ cores }}"
    ostype: l26
    scsihw: virtio-scsi-pci
    onboot: true
    state: present
    boot: order=scsi0
    ide:
      ide2: local:cloudinit
    ipconfig:
      ipconfig0: "{{ ipconfig0 }}"
    net:
      net0: "virtio={{ mac }},bridge={{ net_bridge }}"
  when: >
     vm_name is defined and
     vm_info.proxmox_vms is defined and
     vm_name not in (
       vm_info.proxmox_vms | selectattr('name', 'defined') | map(attribute='name') | list
     )
  delegate_to: localhost
  become: false

- name: Get all VMs on node
  community.general.proxmox_vm_info:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    node: "{{ proxmox_node_name }}"
  register: all_vm_info
  delegate_to: localhost
  become: false

- name: Extract VMID of media VM
  set_fact:
    media_vm_id: >-
      {{
        all_vm_info.proxmox_vms |
        selectattr('name', 'equalto', vm_name) |
        map(attribute='vmid') |
        list |
        first
      }}
  when: vm_name is defined
  delegate_to: localhost

# - name: Check if image for VM is already on Proxmox 
#   ansible.builtin.stat:
#     path: "/var/lib/vz/images/{{ media_vm_id }}/vm-{{ media_vm_id }}-disk-0.raw"
#   register: disk_stat
#   delegate_to: pve
#
- name: Check if VM disk already exists
  ansible.builtin.stat:
    path: "/var/lib/vz/images/{{ media_vm_id }}/vm-{{ media_vm_id }}-disk-0.raw"
  register: disk_stat
  delegate_to: pve

- name: Ensure cloud image directory exists
  file:
    path: "/var/lib/vz/template/qemu"
    state: directory
  delegate_to: pve

- name: Check if cloud image exists on Proxmox
  ansible.builtin.stat:
    path: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
  register: cloud_image_stat
  delegate_to: pve

- name: Download Ubuntu cloud image if missing
  ansible.builtin.get_url:
    url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
    dest: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    mode: '0644'
  delegate_to: pve
  when: not cloud_image_stat.stat.exists

- name: Import raw disk into Proxmox VM
  community.general.proxmox_disk:
    api_user: "{{ ansible_api_user }}"
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ ansible_host }}"
    vmid: "{{ media_vm_id }}"
    disk: scsi0
    import_from: "/var/lib/vz/template/qemu/{{ cloud_image_filename }}"
    storage: "{{ cloud_image_storage }}"
    format: raw
    state: present
  delegate_to: localhost
  when: not disk_stat.stat.exists
  become: false

- name: Get VM config from Proxmox
  ansible.builtin.command: qm config {{ media_vm_id }}
  register: vm_config_output
  changed_when: false
  delegate_to: pve

- name: Extract current disk size
  set_fact:
    current_disk_size: "{{ (vm_config_output.stdout | regex_search('scsi0:.*size=(\\d+)([GMK])', '\\1 \\2')) | default('0 G') }}"
  delegate_to: localhost

- name: Convert current disk size to MiB
  set_fact:
    current_disk_mib: >-
      {{
        (current_disk_size.split()[0] | int) *
        (
          1024 if current_disk_size.split()[1] == 'G' else
          1 if current_disk_size.split()[1] == 'M' else
          0
        )
      }}
  delegate_to: localhost

- name: Convert target disk size to MiB
  set_fact:
    target_disk_mib: "{{ ( disk_size | regex_replace('G', '') | int) * 1024 }}"
  delegate_to: localhost

- name: Resize disk if current size is smaller
  ansible.builtin.command: qm resize {{ media_vm_id }} scsi0 {{ disk_size }}
  when: current_disk_mib < target_disk_mib
  delegate_to: pve

- name: Finalize and start VM
  community.general.proxmox_kvm:
    api_user: root@pam
    api_password: "{{ vault_proxmox_password }}"
    api_host: "{{ hostvars['pve']['ansible_host'] }}"
    node: "{{ proxmox_node_name }}"
    vmid: "{{ media_vm_id }}"
    name: "{{ vm_config.name }}"
    memory: "{{ vm_config.memory }}"
    cores: "{{ vm_config.cores }}"
    ostype: l26
    scsihw: virtio-scsi-pci
    onboot: true
    state: started

    boot: order=scsi0
    bootdisk: scsi0
    scsi:
      scsi0: "{{ cloud_image_storage }}:vm-{{ media_vm_id }}-disk-0,format=raw"

    ide:
      ide2: local:cloudinit
    citype: nocloud
    ciuser: "{{ vm_config.ciuser }}"
    cipassword: "{{ vault_media_john_password }}"
    sshkeys: "{{ lookup('file', vm_defaults.ssh_key) }}"
    ipconfig:
      ipconfig0: "{{ vm_config.ipconfig0 }}"
    net:
      net0: "virtio={{ vm_config.mac }},bridge={{ vm_config.net_bridge }}"
    serial:
      serial0: socket
    force: true
  delegate_to: pve

- name: Wait for SSH to become available on media VM
  wait_for:
    host: "{{ hostvars['media-vm']['ansible_host'] }}"
    port: 22
    delay: 5
    timeout: 120
    state: started
  delegate_to: localhost
