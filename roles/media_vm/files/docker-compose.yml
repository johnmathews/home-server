# media_vm/files/docker-compose.yml

---

services:
  maintainerr:
    image: ghcr.io/jorenn92/maintainerr:latest
    container_name: maintainerr
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - UI_PORT=6246
      - API_PORT=3001
      # - BASE_PATH=/maintainerr # uncomment if you're serving maintainerr from a subdirectory
    volumes:
      - /srv/media/config/maintainerr/data:/opt/data  # Adjust to the path you want to browse
    ports:
      - 6246:6246
      - 3001:3001
    restart: always

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "${PUID}:${PGID}" 
    ports:
      - "8082:80"
    volumes:
      - /mnt/media:/srv  # Adjust to the path you want to browse
      - /srv/media/config/filebrowser/config:/config  # Config and database
      - /srv/media/config/filebrowser/config/database:/database  # Config and database
    environment:
      - TZ=Europe/Amsterdam
      - FB_ROOT=/srv
    restart: always

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    healthcheck:
      test: ["CMD", "wget", "-q0-", "https://ifconfig.me"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/sabnzbd:/config # Persistent settings
      - /mnt/media/library/downloads:/downloads
      - /mnt/media/library:/library
    network_mode: "service:gluetun"
    restart: always

  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PASSWORD=${CALIBRE_PASSWORD}
      # - CLI_ARGS=
    volumes:
      - /srv/media/config/calibre:/config/calibre
      - /srv/media/config/calibre-web:/config/calibre-web
      - /mnt/media/media:/media
      - /mnt/media/library:/library
    ports:
      - "8180:8080"  # GUI
      - "8181:8081"  # Content server
    restart: always

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - /srv/media/config/calibre:/config/calibre
      - /srv/media/config/calibre-web:/config/calibre-web
      - /mnt/media/media:/media
      - /mnt/media/library:/library
    ports:
      - "8083:8083"
    restart: always

  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/kavita:/config
      - /mnt/media/media:/media
      - /mnt/media/library:/library
    ports:
      - 5000:5000
    restart: always

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/sonarr:/config
      - /mnt/media/library:/library
      - /usr/local/bin:/usr/local/bin
      # keep this so it understands what sabnzbd sees
      - /mnt/media/library/downloads:/downloads 
    ports:
      - "8989:8989"
    restart: always

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/radarr:/config
      - /mnt/media/library:/library
      - /usr/local/bin:/usr/local/bin
      # keep this so it understands what sabnzbd sees
      - /mnt/media/library/downloads:/downloads
    ports:
      - "7878:7878"
    restart: always

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 8080:8080 # qBittorrent WebUI
      - 8081:8081 # sabnzbd WebUI, set in config file.
      - 6881:6881 # BitTorrent port
      - 6881:6881/udp
      - 3189:3189 # endpoint port
      - 8000:8000/tcp # control server port
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
    volumes:
      - /srv/media/config/gluetun:/gluetun
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://ifconfig.me"]
      interval: 60s
      timeout: 10s
      retries: 3
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=wireguard
      - FIREWALL=on
      - WIREGUARD_ENDPOINT=${WIREGUARD_ENDPOINT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - OWNED_ONLY=yes
      - TZ=Europe/Amsterdam
    restart: always

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    security_opt:
      - no-new-privileges:true
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_USERNAME=${QBITTORRENT_USERNAME}
      - WEBUI_PASSWORD=${QBITTORRENT_PASSWORD}
    volumes:
      - /srv/media/config:/config
      - /mnt/media/library/downloads:/downloads
      - /mnt/media/library:/media
    restart: always

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    ports:
      - "${PORT:-8191}:8191"
    restart: always 

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/prowlarr:/config
    ports:
      - "9696:9696"
    restart: always

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    ports:
      - 5055:5055
    environment:
      - LOG_LEVEL=info
    volumes:
      - /srv/media/config/jellyseer:/app/config
    restart: always

  jellyseerr-kids:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr-kids
    ports:
      - 5056:5055
    environment:
      - LOG_LEVEL=info
    volumes:
      - /srv/media/config/jellyseer-kids:/app/config
    restart: always

  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    ports:
      - "6767:6767"
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/media/config/bazarr:/config
      - /mnt/media/library:/library
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "18080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true  # required for some metrics
