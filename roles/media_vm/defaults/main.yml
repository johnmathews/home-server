# media_vm/defaults/main.yml

# defaults/main.yml has the lowest priority. host_vars/media-vm.yml has highest priority.

# Changing this will require you to `cd /src/media && docker compose logs qbittorrent` 
# to get the new temp password. Then in qBittorrent set the old password again
reset_qbittorrent_config: false

PUID: 3002
PGID: 3002

qbittorrent_uid: 3002
qbittorrent_gid: 3002

qbittorrent_password_hash: 16c5e9c9b842bd6bf78aafa66643304e0cfe2586

TZ: Europe/Amsterdam

cloud_image_url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img

cloud_image_dir: "{{ playbook_dir }}/cloud-images"
cloud_image_base_filename: "jammy-server-cloudimg-amd64.img"
cloud_image_filename: "jammy-server-cloudimg-amd64.raw"

proxmox_api_host: "{{ hostvars['pve']['ansible_host'] }}"

media_stack_user: john
media_stack_group: media
media_stack_mount_dir: /mnt/media
media_stack_config_dir: /srv/media/config

media_stack_services:
  jellyfin_port: 8096
  qbittorrent_port: 8080
  sonarr_port: 8989
  radarr_port: 7878
  jackett_port: 9117
  bazarr_port: 6767

media_stack_users:
  jellyfin:
    username: john
  qbittorrent:
    username: admin
  sonarr:
    username: john
  radarr:
    username: john
  bazarr:
    username: john
  jackett:
    username: john
  filebrowser:
    username: john

smb_server: 192.168.2.104
smb_media_vm_username: media_vm
smb_shares:
  - name: tv
    target: /mnt/media/library/tv
  - name: movies
    target: /mnt/media/library/movies
  - name: downloads
    target: /mnt/media/downloads
