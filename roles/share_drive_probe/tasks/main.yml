# share_drive_probe/tasks/main.yml

---

- name: Ensure config and metrics directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ mount_touch_probe_conf_dir }}"
    - "{{ mount_touch_probe_textfile_dir }}"


- name: Ensure textfile collector directory permissions are correct
  file:
    path: "{{ mount_touch_probe_textfile_dir }}"
    state: directory
    owner: root
    group: root
    mode: "{{ mount_touch_probe_textfile_dir_mode }}"
  become: true
  notify:
    - Daemon reload
    - Restart mount-touch-probe timer

- name: Ensure probe metrics file has correct permissions (if present)
  file:
    path: "{{ mount_touch_probe_textfile_dir }}/mount_touch_probe.prom"
    state: file
    owner: root
    group: root
    mode: "{{ mount_touch_probe_metrics_mode }}"
  become: true
  ignore_errors: true
  notify:
    - Daemon reload
    - Restart mount-touch-probe timer

- name: Ensure state dir exists
  file:
    path: "{{ mount_touch_probe_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Write targets file
  copy:
    dest: "{{ mount_touch_probe_targets_file }}"
    owner: root
    group: root
    mode: '0644'
    content: |
      {%- for t in (nfs_shares | default([])) -%}
      {{ t.mountpoint }},{{ t.target }}
      {% endfor -%}
      {%- for t in (smb_shares | default([])) -%}
      {{ t.mountpoint }},{{ t.target }}
      {% endfor -%}

- name: Install probe script
  template:
    src: templates/mount_touch_probe.sh.j2
    dest: "{{ mount_touch_probe_bin }}"
    owner: root
    group: root
    mode: '0755'
  notify: Restart mount-touch-probe timer

- name: Install systemd service
  template:
    src: templates/mount_touch_probe.service.j2
    dest: /etc/systemd/system/mount-touch-probe.service
    mode: '0644'
  notify: Daemon reload

- name: Install systemd timer
  template:
    src: templates/mount_touch_probe.timer.j2
    dest: /etc/systemd/system/mount-touch-probe.timer
    mode: '0644'
  notify:
    - Daemon reload
    - Restart mount-touch-probe timer

- name: Enable and start timer
  systemd:
    name: mount-touch-probe.timer
    enabled: true
    state: started

