# share_drive_probe/tasks/main.yml

- name: Ensure config and metrics directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ share_drive_probe_conf_dir }}"
    - "{{ share_drive_probe_textfile_dir }}"

- name: Ensure textfile collector directory permissions are correct
  ansible.builtin.file:
    path: "{{ share_drive_probe_textfile_dir }}"
    state: directory
    owner: root
    group: root
    mode: "{{ share_drive_probe_textfile_dir_mode }}"
  become: true
  notify:
    - Reload daemon
    - Restart share-drive-probe timer

- name: Ensure probe metrics file has correct permissions (if present)
  ansible.builtin.file:
    path: "{{ share_drive_probe_textfile_dir }}/share_drive_probe.prom"
    state: file
    owner: root
    group: root
    mode: "{{ share_drive_probe_metrics_mode }}"
  become: true
  ignore_errors: true
  notify:
    - Reload daemon
    - Restart share-drive-probe timer

- name: Ensure state dir exists
  ansible.builtin.file:
    path: "{{ share_drive_probe_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Write targets file
  ansible.builtin.copy:
    dest: "{{ share_drive_probe_targets_file }}"
    owner: root
    group: root
    mode: '0644'
    content: |
      {%- for t in (nfs_shares | default([])) -%}
      {{ t.mountpoint }},{{ t.target }}
      {% endfor -%}

- name: Install probe script
  ansible.builtin.template:
    src: templates/share_drive_probe.sh.j2
    dest: "{{ share_drive_probe_bin }}"
    owner: root
    group: root
    mode: '0755'
  notify:
    - Reload daemon
    - Run share-drive-probe service
    - Restart share-drive-probe timer

- name: Install systemd service
  ansible.builtin.template:
    src: templates/share_drive_probe.service.j2
    dest: /etc/systemd/system/share-drive-probe.service
    mode: '0644'
  notify:
    - Reload daemon
    - Run share-drive-probe service

- name: Install systemd timer
  ansible.builtin.template:
    src: templates/share_drive_probe.timer.j2
    dest: /etc/systemd/system/share-drive-probe.timer
    mode: '0644'
  notify:
    - Reload daemon
    - Restart share-drive-probe timer

- name: Manage share-drive-probe timer state
  ansible.builtin.systemd:
    name: share-drive-probe.timer
    state: "{{ 'started' if share_drive_probe_enabled else 'stopped' }}"
    enabled: "{{ share_drive_probe_enabled }}"
    daemon_reload: true
