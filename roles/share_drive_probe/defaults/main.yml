# How often to probe (systemd timer)
share_drive_probe_interval: 2m

# Per-operation timeout (touch/rm), use GNU timeout syntax (e.g., 10s, 1m)
share_drive_probe_op_timeout: 10s

# Script + config install locations
share_drive_probe_bin: /usr/local/bin/share_drive_probe.sh
share_drive_probe_conf_dir: /etc/share_drive_probe
share_drive_probe_targets_file: "{{ share_drive_probe_conf_dir }}/targets.list"

# Where node_exporter reads textfile metrics (adjust if you use a custom dir)
share_drive_probe_textfile_dir: /var/lib/node_exporter/textfile_collector
share_drive_probe_state_dir: /var/lib/share_drive_probe

share_drive_probe_textfile_dir_mode: '0755'
share_drive_probe_metrics_mode: '0644'

share_drive_probe_autofs_wake: true
share_drive_probe_autofs_poll_count: 30          # 30 * 0.1s = 3s max wait after wake
share_drive_probe_autofs_poll_sleep_sec: '0.1'

share_drive_probe_dont_spin_up_start: 21:00
share_drive_probe_dont_spin_up_end: 11:00
