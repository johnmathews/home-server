# How often to probe (systemd timer)
mount_touch_probe_interval: 2m

# Per-operation timeout (touch/rm), use GNU timeout syntax (e.g., 10s, 1m)
mount_touch_probe_op_timeout: 10s

# Script + config install locations
mount_touch_probe_bin: /usr/local/bin/mount_touch_probe.sh
mount_touch_probe_conf_dir: /etc/mount_touch_probe
mount_touch_probe_targets_file: "{{ mount_touch_probe_conf_dir }}/targets.list"

# Where node_exporter reads textfile metrics (adjust if you use a custom dir)
mount_touch_probe_textfile_dir: /var/lib/node_exporter/textfile_collector
mount_touch_probe_state_dir: /var/lib/mount_touch_probe

mount_touch_probe_textfile_dir_mode: '0755'
mount_touch_probe_metrics_mode: '0644'

mount_touch_probe_autofs_wake: true
mount_touch_probe_autofs_poll_count: 30          # 30 * 0.1s = 3s max wait after wake
mount_touch_probe_autofs_poll_sleep_sec: '0.1'

mount_touch_probe_dont_spin_up_start: 21:00
mount_touch_probe_dont_spin_up_end: 11:00
