# roles/tubearchivist_lxc/tasks/sleep_docker_containes.yml
- name: Ensure quiet-hours directory exists
  become: true
  ansible.builtin.file:
    path: /etc/sleep-hours
    state: directory
    owner: root
    group: root
    mode: '0755'
- name: Install docker-sleep script
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/docker-sleep.sh
    dest: /usr/local/bin/docker-sleep.sh
    owner: root
    group: root
    mode: '0755'
  notify: restart sleep-hours timers
- name: Install systemd service (templated @ service)
  become: true
  ansible.builtin.template:
    src: templates/sleep_containers/docker-sleep@.service
    dest: /etc/systemd/system/docker-sleep@.service
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers
- name: Install pause timer
  become: true
  ansible.builtin.template:
    src: templates/sleep_containers/docker-sleep@pause.timer.j2
    dest: /etc/systemd/system/docker-sleep@pause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers
- name: Install unpause timer
  become: true
  ansible.builtin.template:
    src: templates/sleep_containers/docker-sleep@unpause.timer.j2
    dest: /etc/systemd/system/docker-sleep@unpause.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers
- name: Install containers list
  become: true
  ansible.builtin.template:
    src: templates/sleep_containers/containers.list
    dest: /etc/sleep-hours/containers.list
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers
- name: Install Uptime Kuma container→monitor map
  become: true
  ansible.builtin.template:
    src: templates/sleep_containers/kuma.map
    dest: /etc/sleep-hours/kuma.map
    owner: root
    group: root
    mode: '0644'
  notify: restart sleep-hours timers
- name: Enable and start timers
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - docker-sleep@pause.timer
    - docker-sleep@unpause.timer
# =========================
# Uptime Kuma CLI (kumactl)
# =========================
- name: Ensure directory for kumactl venv exists
  become: true
  ansible.builtin.file:
    path: /opt/uptimekumactl
    state: directory
    owner: root
    group: root
    mode: '0755'
# --- prerequisites (APT) ---
# Always install generic Python 3 toolchain
- name: Install generic Python venv/pip prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
    update_cache: yes
    cache_valid_time: 3600
# Only on Ubuntu 24.04+ is python3.12-venv a thing; install it if available.
- name: Install python3.12-venv on Ubuntu Noble or newer
  become: true
  ansible.builtin.apt:
    name: python3.12-venv
    state: present
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version is version('24.04', '>=')
# --- venv creation (prefer 3.12 if present) ---
- name: Detect python3.12 availability
  become: false
  ansible.builtin.shell: "command -v python3.12 || true"
  args:
    executable: /bin/bash
  register: py312_path
  changed_when: false
- name: Create venv with python3.12 if present
  become: true
  ansible.builtin.command: "{{ py312_path.stdout }} -m venv /opt/uptimekumactl/venv"
  args:
    creates: /opt/uptimekumactl/venv/bin/activate
  when: py312_path.stdout | length > 0
- name: Create venv with default python3 otherwise
  become: true
  ansible.builtin.command: python3 -m venv /opt/uptimekumactl/venv
  args:
    creates: /opt/uptimekumactl/venv/bin/activate
  when: py312_path.stdout | length == 0
- name: Verify venv has working pip
  become: true
  ansible.builtin.command: /opt/uptimekumactl/venv/bin/python -m pip --version
  changed_when: false
- name: Upgrade pip in venv
  become: true
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: /opt/uptimekumactl/venv
- name: Install uptime-kuma-api in venv (pinned)
  become: true
  ansible.builtin.pip:
    name: "uptime-kuma-api>=1.2,<1.3"
    virtualenv: /opt/uptimekumactl/venv
- name: Install uptimekumactl CLI
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/uptimekumactl.py
    dest: /usr/local/bin/kumactl.py
    owner: root
    group: root
    mode: '0755'
- name: Rewrite kumactl shebang to use venv python
  become: true
  ansible.builtin.lineinfile:
    path: /usr/local/bin/kumactl.py
    regexp: '^#!.*python'
    line: '#!/opt/uptimekumactl/venv/bin/python3'
# =========================
# Plugins (graceful pause)
# =========================
- name: Ensure plugin directory exists
  become: true
  ansible.builtin.file:
    path: /usr/local/lib/sleep-hours/plugins
    state: directory
    owner: root
    group: root
    mode: '0755'
- name: Install graceful shutdown common helper
  become: true
  ansible.builtin.copy:
    src: templates/sleep_containers/plugins/common.sh
    dest: /usr/local/lib/sleep-hours/plugins/common.sh
    owner: root
    group: root
    mode: '0644'
- name: Install graceful shutdown plugins
  become: true
  ansible.builtin.copy:
    src: "templates/sleep_containers/plugins/{{ item }}"
    dest: "/usr/local/lib/sleep-hours/plugins/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - default.sh
