# roles/jellyfin_lxc/tasks/main.yml

---

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: yes

- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/alloy
  tags: alloy

- name: Upload alloy config files 
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{docker_user }}"
    group: "{{docker_user }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/infra/alloy/config.alloy 
  become: true
  tags: [docker, alloy] 

# Copy environment and compose files
- name: Copy docker-compose.yml
  template:
    src: templates/docker-compose.yml.j2
    dest: /srv/apps/docker-compose.yml
    mode: '0644'
    owner: root
    group: root
  notify: 
    - Update containers
    - Restart Docker Compose stack
  tags: docker
