# roles/jellyfin_lxc/tasks/main.yml
- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true
- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/alloy
  tags: alloy, docker
  notify:
    - Restart alloy
- name: Upload alloy config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/apps/alloy/config.alloy
  become: true
  tags: [docker, alloy]
  notify:
    - Restart alloy
- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: /srv/apps/docker-compose.yml
    mode: '0644'
    owner: root
    group: root
  notify:
    - Restart docker compose stack
  tags: docker, alloy
