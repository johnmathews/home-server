# roles/pve-repos/tasks/main.yml
---
- name: Disable Proxmox enterprise repo
  lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb '
    line: '# deb https://enterprise.proxmox.com/debian/pve bookworm pve-enterprise'
    state: present
  when: ansible_facts['distribution'] == 'Debian'

- name: Disable Ceph enterprise repo
  lineinfile:
    path: /etc/apt/sources.list.d/ceph.list
    regexp: '^deb '
    line: '# deb https://enterprise.proxmox.com/debian/ceph-quincy bookworm enterprise'
    state: present
  when: ansible_facts['distribution'] == 'Debian'

- name: Add Proxmox no-subscription repo
  copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
  when: ansible_facts['distribution'] == 'Debian'
