TZ: Europe/Amsterdam
proxmox_api_user: "api@pve"
docker_compose_dir: "/srv/apps"
docker_user: john
puid: 1001
guid: 1001
pgid: 1001

smb_media_vm_username: media_vm
smb_server: 192.168.2.104
smb_opts_items:
  - credentials=/etc/smb-media-credentials
  - uid={{ puid }}
  - gid={{ guid }}
  - file_mode=0664
  - dir_mode=0775
  - vers=3.1.1
  - sec=ntlmssp
  - serverino
  - _netdev
  - nofail
  - iocharset=utf8
  - x-systemd.automount
  - x-systemd.idle-timeout=60s
  - x-systemd.mount-timeout=30s
smb_opts: "{{ smb_opts_items | join(',') }}"

# sleep docker containers during quiet hours and pause uptime-kuma monitors
uptime_kuma_url: "http://192.168.2.106:3001"
uptime_kuma_user: "john"
