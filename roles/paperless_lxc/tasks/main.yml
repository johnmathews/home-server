# roles/paperless_lxc/tasks/main.yml

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true

- name: Ensure paperless system group exists with fixed gid
  ansible.builtin.group:
    name: paperless
    gid: "{{ pgid }}"
    system: true
    state: present
  tags: paperless

- name: Ensure paperless system user exists with fixed uid/gid
  ansible.builtin.user:
    name: paperless
    uid: "{{ puid }}"
    group: paperless
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  tags: paperless

- name: Create container config directories (root-owned)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/alloy
    - /srv/apps/promtail
  tags: [docker, paperless]

- name: Create data directories with container-managed ownership
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group | default(0) }}"
    mode: "{{ item.mode }}"
  loop:
    # paperless app data — owned by the paperless app uid (puid)
    - {path: /srv/apps/paperless/data, owner: "{{ puid }}", group: "{{ pgid }}", mode: '0755'}
    # postgres data dirs — uid 999 inside the image, must be 0700
    - {path: /srv/apps/paperless/pgdata, owner: 999, mode: '0700'}
    - {path: /srv/apps/library/pgdata, owner: 999, mode: '0700'}
    # redis data — uid 999
    - {path: /srv/apps/paperless/redisdata, owner: 999, mode: '0755'}
  tags: [docker, paperless]

# Owner only — no mode, no group. The document-store dataset uses NFSv4 ACLs
# (Multiprotocol preset), which reject chmod AND chgrp over NFS (EPERM); only
# chown succeeds. Setting owner=999 (the library image's `app` uid) is
# sufficient: the containers write as uid 999, so owning the dir with the
# default 0755 (owner rwx) is all they need. SMB/iPhone access is granted
# separately via the dataset's NFSv4 ACL in the TrueNAS UI, not via unix group.
# Library app data lives on its own document-store dataset — NOT the paperless
# dataset and NOT the media `library` dataset.
- name: Create library data directories on the document-store NFS share (owned by the image's app uid)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 999
  loop:
    - /mnt/nfs/document-store/data
    - /mnt/nfs/document-store/consume
  tags: library

# not needed - only the other clients need the SMB share. the LXC can use only the NFS share
- name: Create smb share
  ansible.builtin.import_tasks: mount-smb.yml
  when: false # never run
  tags: smb

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify: Restart paperless
  tags: docker

- name: Upload config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - {src: templates/config.alloy, dest: /srv/apps/alloy/config.alloy}
  become: true
  tags: alloy
  notify: Restart alloy

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  tags: docker
  notify: Restart all containers

- name: Add consumer health check cron job
  ansible.builtin.cron:
    name: "paperless consumer health check"
    minute: "*/5"
    job: >-
      [ $(docker exec paperless-webserver find /usr/src/paperless/consume -type f -mmin +5 2>/dev/null | wc -l) -gt 0 ] && [ $(docker logs --since 10m paperless-webserver 2>&1 | grep -c 'paperless.consumer') -eq 0 ] && docker exec paperless-webserver s6-svc -r /run/service/svc-consumer/
    user: root
  tags: consumer-health
