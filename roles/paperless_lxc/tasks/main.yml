# roles/jellyfin_lxc/tasks/main.yml

---

- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ docker_compose_dir }}/paperless"


- name: Ensure Paperless data directory is owned by UID/GID 65534
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/paperless/data"
    state: directory
    recurse: yes
    owner: "65534"
    group: "65534"

- name: Create environment file from template
  template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify: 
    - Update containers
    - Restart media stack

- name: Copy docker-compose.yml
  template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  notify: 
    - Update containers
    - Restart Docker Compose stack
