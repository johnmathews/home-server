# roles/paperless_lxc/tasks/main.yml

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true

- name: Ensure paperless system group exists with fixed gid
  ansible.builtin.group:
    name: paperless
    gid: "{{ pgid }}"
    system: true
    state: present
  tags: paperless

- name: Ensure paperless system user exists with fixed uid/gid
  ansible.builtin.user:
    name: paperless
    uid: "{{ puid }}"
    group: paperless
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  tags: paperless

- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/paperless/data
    - /srv/apps/paperless/pgdata
    - /srv/apps/paperless/redisdata
    - /srv/apps/alloy
    - /srv/apps/promtail
    - /srv/apps/library/pgdata
  tags: docker

# No mode here: the TrueNAS NFSv4 ACLs reject chmod (EPERM) — chown works.
- name: Create library data directories on the NFS share (owned by the image's app uid)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 999
    group: 999
  loop:
    - /mnt/nfs/paperless/library
    - /mnt/nfs/paperless/library-consume
  tags: library

- name: Ensure correct directory ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 999
    group: 999
    mode: '0700'
  notify: Restart all containers
  tags: paperless
  loop:
    - /srv/apps/paperless/data
    - /srv/apps/paperless/pgdata
    - /srv/apps/paperless/redisdata

# not needed - only the other clients need the SMB share. the LXC can use only the NFS share
- name: Create smb share
  ansible.builtin.import_tasks: mount-smb.yml
  when: false # never run
  tags: smb

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify: Restart paperless
  tags: docker

- name: Upload config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/apps/alloy/config.alloy
  become: true
  tags: alloy
  notify: Restart alloy

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  tags: docker
  notify: Restart all containers

- name: Add consumer health check cron job
  ansible.builtin.cron:
    name: "paperless consumer health check"
    minute: "*/5"
    job: >-
      [ $(docker exec paperless-webserver find /usr/src/paperless/consume -type f -mmin +5 2>/dev/null | wc -l) -gt 0 ]
      && [ $(docker logs --since 10m paperless-webserver 2>&1 | grep -c 'paperless.consumer') -eq 0 ]
      && docker exec paperless-webserver s6-svc -r /run/service/svc-consumer/
    user: root
  tags: consumer-health
