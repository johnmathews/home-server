# roles/paperless_lxc/tasks/main.yml

---

- name: Ensure cifs-utils is installed
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: yes

- name: Ensure paperless system group exists with fixed GID
  ansible.builtin.group:
    name: paperless
    gid: "{{ pgid }}"
    system: yes
    state: present

- name: Ensure paperless system user exists with fixed UID/GID
  ansible.builtin.user:
    name: paperless
    uid: "{{ puid }}"
    group: paperless
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
    state: present

- name: Create base app directories for containers
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /srv/apps/paperless/data
    - /srv/apps/paperless/pgdata
    - /srv/apps/paperless/redisdata
    - /srv/apps/alloy
  tags: docker

- name: Ensure paperless data directory ownership
  ansible.builtin.file:
    path: /srv/apps/paperless/data
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0770'
  notify: restart all containers
  tags: docker

- name: Ensure Postgres data directory ownership
  ansible.builtin.file:
    path: /srv/apps/paperless/pgdata
    state: directory
    owner: 999
    group: 999
    mode: '0700'
  notify: restart all containers
  tags: docker

- name: Ensure Redis data directory ownership
  ansible.builtin.file:
    path: /srv/apps/paperless/redisdata
    state: directory
    owner: 999
    group: 999
    mode: '0755'
  notify: restart all containers
  tags: docker

- name: Create environment file from template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ docker_compose_dir }}/.env"
    mode: '0600'
  notify:
    - restart all containers
  tags: docker

- name: Upload alloy config files 
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ puid }}"
    group: "{{ guid }}"
    mode: '0644'
  loop:
    - alloy:
      src: templates/config.alloy
      dest: /srv/apps/alloy/config.alloy 
  become: true
  tags: [docker, alloy] 
  notify: 
    - restart alloy

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ docker_compose_dir }}/docker-compose.yml"
    mode: '0644'
    owner: root
    group: root
  notify:
    - restart all containers
  tags: docker
