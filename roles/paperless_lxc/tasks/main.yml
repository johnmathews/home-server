- name: Ensure paperless system group exists with fixed GID
  ansible.builtin.group:
    name: paperless
    gid: "{{ pgid }}"
    system: yes
    state: present

- name: Ensure paperless system user exists with fixed UID/GID
  ansible.builtin.user:
    name: paperless
    uid: "{{ puid }}"
    group: paperless
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
    state: present

