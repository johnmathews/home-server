# Infra VM uses /srv/infra, not the global default /srv/apps
docker_compose_dir: /srv/infra

# Shell environment configuration
# Add root user (UID < 1000). Auto-discovered users (UID >= 1000) are also included.
# Format: username:home_dir:shell
shell_environment_shell_users:
  - "root:/root:/bin/bash"

nfs_shares:
  - name: library
    mountpoint: /mnt/nfs/library
    target: /mnt/tank/library
  - name: media
    mountpoint: /mnt/nfs/media
    target: /mnt/tank/media
  - name: movies
    mountpoint: /mnt/nfs/movies
    target: /mnt/tank/movies
  - name: photos
    mountpoint: /mnt/nfs/photos
    target: /mnt/tank/photos
