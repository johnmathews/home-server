nfs_shares:
  - name: youtube-kids
    mountpoint: /mnt/nfs/youtube-kids
    target: /mnt/tank/youtube-kids

# Sleep Hours
sleep_hours_enabled: true
# NFS/SMB share control: During quiet hours, shares are automatically disabled
# before pausing/stopping containers, then re-enabled after resuming/starting.
# This prevents HDD wakeups from NFS/SMB clients. Sources: nfs_shares (and smb_shares if defined)
sleep_hours_nfs_smb_enabled: true
sleep_hours_pause_hour: 2
sleep_hours_unpause_hour: 6

# Containers to pause (lightweight freeze, fast resume)
sleep_hours_stop_containers:
  - tubearchivist
  - archivist-es
  - archivist-redis

sleep_hours_kuma_map:
  tubearchivist: 43

sleep_hours_plugins:
  - default.sh

