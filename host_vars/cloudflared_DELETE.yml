# host_vars/cloudflared.yml
ansible_user: root

proxmox_node_name: proxmox

vm_config:
  hostname: cloudflared
  vmid: 202
  mac_address: "02:00:00:cf:00:01"
  ip_address: 192.168.2.217
  ipconfig0: "ip=192.168.2.215/24,gw={{ vm_defaults.gateway }}"
  mac: "02:00:00:cf:00:01"
  net_bridge: "{{ vm_defaults.net_bridge }}"
  cores: 1
  memory: 512
  netmask: 24
  ciuser: "{{ vm_defaults.ciuser }}"
  ssh_key: "{{ vm_defaults.ssh_key }}"
  domain: "johnmathews.is"

  ostemplate: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
  template_storage: "local"
  storage: "local-lvm"

  tunnel_token: "{{ vault_cloudflared_token }}"
  services:
    - subdomain: "home"
      port: 8123
    - subdomain: "jellyfin"
      port: 8096
