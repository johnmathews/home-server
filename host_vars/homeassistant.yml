# host_vars/homeassistant.yml

# variables in host_vars files have high precedence and override defaults/main.yaml and group_vars .yml files.

ansible_host: 192.168.2.218
ansible_user: root 
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

proxmox_node_name: proxmox

vm_config:
  vmid: 203 
  vm_name: homeassistant-vm
  ip_address: 192.168.2.218
  mac: "02:00:00:12:46:66"
  ipconfig0: "ip=192.168.2.218/24,gw=192.168.2.254"
  cores: 4
  memory: 8192
  disk_size: 32G
  ciuser: john
  net_bridge: vmbr0
  ssh_key: "~/.ssh/id_ed25519.pub"

home_assistant_os_image_url: https://github.com/home-assistant/operating-system/releases/download/15.1/haos_ova-15.1.ova
