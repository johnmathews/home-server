# Shell environment configuration
# Add root user (UID < 1000). Auto-discovered users (UID >= 1000) are also included.
# Format: username:home_dir:shell
shell_environment_shell_users:
  - "root:/root:/bin/bash"

nfs_shares:
  - name: downloads
    mountpoint: /mnt/nfs/downloads
    target: /mnt/swift/downloads
  - name: books
    mountpoint: /mnt/nfs/books
    target: /mnt/tank/books
  - name: library
    mountpoint: /mnt/nfs/library
    target: /mnt/tank/library
  - name: media
    mountpoint: /mnt/nfs/media
    target: /mnt/tank/media
  - name: movies
    mountpoint: /mnt/nfs/movies
    target: /mnt/tank/movies

# Sleep Hours Configuration
# NFS/SMB share control: During quiet hours, shares are automatically disabled
# before pausing/stopping containers, then re-enabled after resuming/starting.
# This prevents HDD wakeups from NFS/SMB clients. Sources: nfs_shares (and smb_shares if defined)
sleep_hours_nfs_smb_enabled: false
sleep_hours_enabled: false
sleep_hours_pause_hour: 1
sleep_hours_unpause_hour: 7

# Containers to pause (lightweight freeze, fast resume)
# sleep_hours_pause_containers:

# Containers to stop (clean shutdown, requires full restart)
sleep_hours_stop_containers:
  - prowlarr
  - radarr
  - sonarr
  - jellyseerr
  - bazarr
  - booklore
  - sabnzbd
  - qbittorrent
  - booklore-mariadb

sleep_hours_kuma_map:
  sabnzbd: 28
  qbittorrent: 18
  prowlarr: 42
  bazarr: 19
  radarr: 15
  sonarr: 14
  jellyseerr: 29
  booklore: 40

sleep_hours_plugins:
  - default.sh
  - qbittorrent.sh
  - sabnzbd.sh
  - radarr.sh
  - sonarr.sh
  - prowlarr.sh
  - jellyseerr.sh
  - bazarr.sh
  - filebrowser.sh
  - booklore.sh
  - booklore-mariadb.sh

