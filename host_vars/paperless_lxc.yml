nfs_shares:
  - name: paperless
    mountpoint: /mnt/nfs/paperless
    target: /mnt/tank/paperless

# even though the paperless lxc doesnt need the smb share itself, we can still toggle 
# it off during quiet hours to avoid other clients waking up truenas HDDs.
smb_shares:
  - name: paperless
    target: /mnt/paperless

# NFS/SMB share control: During quiet hours, shares are automatically disabled
# before pausing/stopping containers, then re-enabled after resuming/starting.
# This prevents HDD wakeups from NFS/SMB clients. Sources: nfs_shares (and smb_shares if defined)
sleep_hours_nfs_smb_enabled: false
sleep_hours_enabled: false
sleep_hours_pause_hour: 1
sleep_hours_unpause_hour: 7

# Containers to stop (not pause)
sleep_hours_stop_containers:
  - paperless-webserver
  - paperless-broker
  - paperless-db

# Monitor integration (pause/resume monitoring during sleep hours)
sleep_hours_kuma_map:
  paperless-webserver: 36

# Graceful shutdown plugins
sleep_hours_plugins:
  - default.sh
  - paperless-graceful.sh

# sleep docker containers during quiet hours and pause uptime-kuma monitors
uptime_kuma_url: "http://192.168.2.106:3001"
uptime_kuma_user: "john"

## SHELL 
#
# Neovim
shell_environment_neovim_enabled: true
shell_environment_neovim_config_style: "minimal" # minimal, extended, custom

# Zsh
shell_environment_zsh_enabled: true
shell_environment_set_default_shell: true # Set to true in host_vars to change default shell

# Oh My Zsh
shell_environment_omz_enabled: true
shell_environment_omz_plugins:
  - git
  - docker
  - kubectl
  - sudo
  - history
shell_environment_omz_install_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"

# Powerlevel10k
shell_environment_p10k_enabled: true
shell_environment_p10k_repo: "https://github.com/romkatv/powerlevel10k.git"
shell_environment_p10k_style: "lean" # lean, classic, rainbow, pure

# Atuin integration
shell_environment_atuin_integration: true

# User targeting (empty = auto-discover UID >= 1000)
shell_environment_shell_users: []

# CLI tools (apps.yml)
shell_environment_cli_tools_enabled: true
shell_environment_cli_tools:
  - tldr
  - htop

# Shell aliases
shell_environment_aliases_enabled: true

# SSH directory setup
shell_environment_ssh_setup_enabled: false # User enables in host_vars if needed
