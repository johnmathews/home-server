nfs_shares:
  - name: paperless
    mountpoint: /mnt/nfs/paperless
    target: /mnt/tank/paperless

# even though the paperless lxc doesnt need the smb share itself, we can still toggle 
# it off during quiet hours to avoid other clients waking up truenas HDDs.
smb_shares:
  - name: paperless
    target: /mnt/paperless

# Sleep Hours Configuration
sleep_hours_enabled: true
sleep_hours_pause_hour: 2
sleep_hours_unpause_hour: 6

# Containers to pause (lightweight freeze, fast resume)
sleep_hours_pause_containers:
  - paperless-webserver
  - paperless-broker
  - paperless-db

# Monitor integration (pause/resume monitoring during sleep hours)
sleep_hours_kuma_map:
  paperless-webserver: 36
  paperless-db: 36
  paperless-broker: 36

# Graceful shutdown plugins
sleep_hours_plugins:
  - default.sh
  - paperless-graceful.sh

# NFS/SMB share control via TrueNAS API
# Shares are automatically derived from nfs_shares above
# Disables NFS/SMB shares before stopping containers, re-enables after restart
sleep_hours_nfs_smb_enabled: true
