nfs_shares:
  - name: paperless
    mountpoint: /mnt/nfs/paperless
    target: /mnt/tank/paperless

# Sleep Hours Configuration
sleep_hours_enabled: true
sleep_hours_pause_hour: 2
sleep_hours_unpause_hour: 6

# Use STOP instead of PAUSE for paperless (graceful shutdown for databases)
sleep_hours_containers: []
sleep_hours_stop_containers:
  - paperless-webserver
  - paperless-broker
  - paperless-db

sleep_hours_kuma_map:
  paperless-webserver: 36
  paperless-db: 36
  paperless-broker: 36

sleep_hours_plugins:
  - default.sh
  - paperless-graceful.sh

# NFS/SMB share control (enable after 30+ successful STOP/START cycles)
sleep_hours_nfs_smb_enabled: false
sleep_hours_nfs_shares:
  - tank/paperless
