# host_vars/n8n_lxc.yml

# NFS shares (optional - n8n typically uses local storage)
# Uncomment and configure if workflow file sharing is needed
# nfs_shares:
#   - name: workflows
#     mountpoint: /mnt/nfs/workflows
#     target: /mnt/tank/workflows

# Sleep Hours Configuration
# Disabled by default - n8n needs to run 24/7 for workflow automation
sleep_hours_enabled: false
sleep_hours_nfs_smb_enabled: false
sleep_hours_pause_hour: 1
sleep_hours_unpause_hour: 7
sleep_hours_stop_containers: []
sleep_hours_kuma_map: {}
sleep_hours_plugins: []

# n8n specific configuration
# Note: Update these values based on your setup
n8n_protocol: https # Change to https if using Traefik/reverse proxy
n8n_webhook_url: "http://n8n.itsa.pizza:5678/" # Update if using reverse proxy

# DEPLOYMENT NOTES:
# 1. Docker/runc compatibility: This LXC uses runc 1.2.6 instead of the bundled runc 1.3.3
#    due to a bug where runc 1.3.3 fails to start containers in LXC environments (sysctl
#    access issue). The Ansible role automatically downloads and installs runc 1.2.6 from
#    https://github.com/opencontainers/runc/releases/tag/v1.2.6 if not already present.
#    Backup of original bundled version: /usr/bin/runc.backup
#
# 2. Future updates: When runc 1.3.4+ or 1.4.x is released with the fix, the manually
#    installed runc can be replaced with the version bundled in containerd.io
