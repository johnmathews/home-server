name: Sleep Hours Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'roles/sleep_hours/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'roles/sleep_hours/**'
      - 'tests/**'

jobs:
  test:
    name: Run Sleep Hours Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if sleep hours is enabled
        id: check_enabled
        run: |
          # Check if sleep_hours_enabled is true in any host_vars file
          if grep -rq 'sleep_hours_enabled:\s*true' host_vars/; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "Sleep hours is enabled, running tests"
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Sleep hours is disabled, skipping tests"
          fi

      - name: Skip message
        if: steps.check_enabled.outputs.enabled == 'false'
        run: echo "Skipping sleep hours tests - feature is disabled in config"

      - name: Set up Python
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq curl netcat-openbsd

      - name: Verify Docker is running
        if: steps.check_enabled.outputs.enabled == 'true'
        run: docker --version

      - name: Run test suite
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd tests
          ./run_tests.sh

      - name: Upload test logs on failure
        if: failure() && steps.check_enabled.outputs.enabled == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: test-logs
          path: /tmp/sleep-hours-test-*/logs/
          retention-days: 7

      - name: Clean up test containers
        if: always() && steps.check_enabled.outputs.enabled == 'true'
        run: |
          docker ps -a --filter label=quiet-hours-test=true -q | xargs -r docker rm -f || true
