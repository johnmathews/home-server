# Tailscale Inventory - Remote access via Tailscale VPN
#
# SETUP INSTRUCTIONS:
# 1. Generate auth key at: https://login.tailscale.com/admin/settings/keys
#    - Set expiration to 90 days or longer
#    - Check "Reusable" if you plan to reinstall nodes
#    - Check "Ephemeral" if you want nodes to auto-remove when offline
#
# 2. Add the auth key to group_vars/all/vault.yml:
#    tailscale_auth_key: "tskey-auth-XXXXX"
#
# 3. Run: make tailscale
#
# 4. After deployment, get Tailscale IPs for each host:
#    ssh user@192.168.2.X "tailscale ip -4"
#
# 5. Update the ansible_host values below with actual Tailscale IPs
#
# NOTE: This inventory is for REMOTE access when traveling.
# For LOCAL access, continue using inventory.ini with 192.168.2.x addresses.

