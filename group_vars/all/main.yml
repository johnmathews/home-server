cloud_image_url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
cloud_image_filename: "jammy-server-cloudimg-amd64.img"
cloud_image_vmid: 201
cloud_image_storage: "local"

sshkeys: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

proxmox_node: proxmox
vm_defaults:
  net_bridge: "vmbr0"
  ciuser: "john"
  ssh_key: "~/.ssh/id_ed25519.pub"
  gateway: "192.168.2.254"

# share drive probe (used in tasks/infra_vm/templates/homepage/services.yml and tasks/share_drive_probe)
share_drive_probe_quiet_hours_start: "23:55"
share_drive_probe_quiet_hours_end: "08:00"

# quiet hours - sleep docker containers at night so that HDDs spin down
docker_quiet_hours_start: "00:00" # used in docker-sleep@.service
docker_quiet_hours_start_hour: "00"
docker_quiet_hours_end: "08:00" # used in docker-sleep@unpause.timer
docker_quiet_hours_end_hour: "08"
docker_quiet_hours_try_until_hour: "06" # used in docker-sleep@pause.timer
uptime_kuma_url: "http://192.168.2.106:3001" # pause the uptime monitor when the container is paused
uptime_kuma_user: "john"

ansible_python_interpreter: /usr/bin/python3

# Atuin version — pins both the client binary and the server Docker image (infra VM compose)
atuin_version: "v18.13.3"

# Monitoring sidecar pins — single source for the roles that pin these images.
# Roles reference them via their own defaults (alloy_version: "{{ sidecar_alloy_version }}"),
# so roles that deliberately track :latest (agent, music, prometheus, traefik,
# document_library) are unaffected. jellyfin_lxc hardcodes the same pins in its
# static files/docker-compose.yml — keep it in sync by hand.
# Portainer agent — pin to the Portainer server version (infra VM). Agents are
# deployed by every docker role's compose; register new endpoints in Portainer.
portainer_agent_version: "2.39.1"

sidecar_alloy_version: "v1.5.1"
sidecar_node_exporter_version: "v1.8.2"
sidecar_cadvisor_version: "v0.49.1"

# MikroTik router monitoring (MKTXP)
mikrotik_router_ip: 192.168.2.1

# DNS servers for hosts that manage /etc/resolv.conf directly (e.g. PVE)
# VMs/LXCs with systemd-resolved get DNS via DHCP from MikroTik (which advertises AdGuard)
dns_primary: "192.168.2.111" # AdGuard Home
dns_fallback: "9.9.9.9" # Quad9 (matches Unbound upstream)

# domain name
primary_domain_name: "itsa-pizza.com"

# Common defaults shared across roles (override in role defaults or host_vars as needed)
TZ: Europe/Amsterdam
puid: 1001
guid: 1001
docker_user: john
docker_compose_dir: "/srv/apps"
proxmox_api_user: "api@pve"

# Monitoring infrastructure
loki_write_endpoint: "http://192.168.2.106:3100/loki/api/v1/push"
infra_vm_ip: "192.168.2.106"
