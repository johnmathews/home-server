# playbooks/jellyfin_lxc.yml

---

- name: Jellyfin LXC
  hosts: jellyfin_lxc
  gather_facts: true
  become: true

  roles:
    - role: nfs_client
      tags: [nfs]
    - role: jellyfin_lxc
      tags: [jellyfin]

  vars:
    foo: bar
    # NFS
    nfs_client_mounts:
      - name: library
        mountpoint: /mnt/nfs/library
        target: /mnt/tank/library
      - name: media
        mountpoint: /mnt/nfs/media
        target: /mnt/tank/media
      - name: youtube-kids
        mountpoint: /mnt/nfs/youtube-kids
        target: /mnt/tank/youtube-kids
