# playbooks/jellyfin_lxc.yml

---

- name: Jellyfin LXC
  hosts: jellyfin_lxc
  gather_facts: true
  become: true

  roles:
    - role: jellyfin_lxc
      tags: [jelly]
    - role: nfs_client
      tags: [nfs]
    - role: share_drive_probe 
      tags: [shares]

  vars:
    nfs_client_mounts:
      - name: media
        mountpoint: /mnt/nfs/media
        target: /mnt/tank/media
      - name: youtube-kids
        mountpoint: /mnt/nfs/youtube-kids
        target: /mnt/tank/youtube-kids
      - name: kids
        mountpoint: /mnt/nfs/library/kids
        target: /mnt/tank/library/kids
      - name: family
        mountpoint: /mnt/nfs/library/family
        target: /mnt/tank/library/family
