# playbooks/immich_lxc.yml

---

- name: Tubearchivist LXC
  hosts: tubearchivist_lxc
  gather_facts: true
  become: true

  roles:
    - role: nfs_client
      tags: [nfs]
    - role: tubearchivist_lxc
      tags: [tubearchivist]

  vars:
    nfs_client_mounts:
      - name: youtube-kids
        mountpoint: /mnt/nfs/youtube-kids
        target: /mnt/tank/youtube-kids
