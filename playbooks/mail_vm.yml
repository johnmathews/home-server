# playbooks/mail_vm.yml

- name: Mailcow VM
  hosts: mailcow-vm
  gather_facts: true
  become: true

  roles:
    - role: shell_environment
      tags: shell
    - role: tailscale
      tags: tailscale
    - role: mail_vm
      tags: mail_vm

  vars:
    proxmox_node_name: proxmox
    ciuser: "{{ vm_defaults.ciuser }}"
    ssh_key: "{{ vm_defaults.ssh_key }}"

    ansible_api_user: root@pam
    ansible_ssh_private_key_file: ~/.ssh/john_macbook

    vm_name: mailcow
    vm_id: 103
    vm_cloud_init_mac: 02:00:00:00:01:03
    vm_ip_address: 192.168.2.103

    mail_domain: "{{ primary_domain_name }}"
    mail_hostname: "mail.{{ primary_domain_name }}"
