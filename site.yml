# site.yml
---
- name: Proxmox VE Configuration
  hosts: proxmox
  become: true

  vars:
    email_address: "john@johnmathews.is"

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  roles:
    - role: pve-repos
    - role: common
    - role: zram
    - role: postfix
    - role: upload_iso
    - role: truenas_vm
    - role: upload_cloud_image
    - role: media_vm
